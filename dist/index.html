<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NCLEX Study Tool</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #3b82f6;
            --text: #f8fafc;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: #334155;
        }

        body {
            background-color: var(--primary);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding-bottom: 80px;
        }

        .nexus-nav {
            background: var(--secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 1rem 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .control-panel {
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
            position: sticky;
            top: 82px;
            z-index: 999;
        }

        .nexus-card {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .nexus-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card-icon {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-accent {
            background-color: var(--accent);
            border-color: var(--accent);
            color: var(--primary);
        }

        .btn-accent:hover {
            background-color: #0066cc;
            border-color: #0066cc;
            color: var(--primary);
        }

        .btn-outline-purple {
            color: #8b5cf6;
            border-color: #8b5cf6;
        }

        .btn-outline-purple:hover {
            color: #7c3aed;
            background-color: rgba(139, 92, 246, 0.1);
            border-color: #7c3aed;
        }

        .border-purple {
            border-color: #8b5cf6 !important;
        }

        .text-purple { color: #8b5cf6 !important; }
        .bg-purple { background-color: #8b5cf6 !important; }

        .text-pink { color: #ec4899 !important; }
        .bg-pink { background-color: #ec4899 !important; }
        .border-pink { border-color: #ec4899 !important; }

        /* Custom button colors for drug filters */
        .btn-outline-orange { color: #f97316; border-color: #f97316; }
        .btn-outline-orange:hover, .btn-outline-orange.active-gi { color: #fff; background-color: #f97316; border-color: #f97316; }
        .bg-orange { background-color: #f97316 !important; }

        .btn-outline-pink { color: #ec4899; border-color: #ec4899; }
        .btn-outline-pink:hover, .btn-outline-pink.active-endo, .btn-outline-pink.active-repro { color: #fff; background-color: #ec4899; border-color: #ec4899; }

        .btn-outline-cyan { color: #06b6d4; border-color: #06b6d4; }
        .btn-outline-cyan:hover, .btn-outline-cyan.active-neuro { color: #fff; background-color: #06b6d4; border-color: #06b6d4; }
        .bg-cyan { background-color: #06b6d4 !important; }

        .btn-outline-teal { color: #14b8a6; border-color: #14b8a6; }
        .btn-outline-teal:hover, .btn-outline-teal.active-immun { color: #fff; background-color: #14b8a6; border-color: #14b8a6; }
        .bg-teal { background-color: #14b8a6 !important; }

        .btn-outline-purple:hover, .btn-outline-purple.active-cns { color: #fff; background-color: #8b5cf6; border-color: #8b5cf6; }

        /* Active states for all filter buttons */
        .btn-outline-primary.active-cv { color: #fff; background-color: #0d6efd; border-color: #0d6efd; }
        .btn-outline-success.active-dm { color: #fff; background-color: #198754; border-color: #198754; }
        .btn-outline-warning.active-pain, .btn-outline-warning.active-msk { color: #000; background-color: #ffc107; border-color: #ffc107; }
        .btn-outline-danger.active-abx { color: #fff; background-color: #dc3545; border-color: #dc3545; }
        .btn-outline-info.active-resp { color: #fff; background-color: #0dcaf0; border-color: #0dcaf0; }
        .btn-outline-secondary.active-uro { color: #fff; background-color: #6c757d; border-color: #6c757d; }
        .btn-outline-light.active-ophthal, .btn-outline-light.active-derm { color: #000; background-color: #f8f9fa; border-color: #f8f9fa; }
        .btn-outline-danger.active-hem { color: #fff; background-color: #dc3545; border-color: #dc3545; }
        .btn-outline-warning.active-emerg { color: #000; background-color: #ffc107; border-color: #ffc107; }
        .btn-outline-info.active-lytes { color: #fff; background-color: #0dcaf0; border-color: #0dcaf0; }

        .text-orange { color: #f97316 !important; }
        .bg-orange { background-color: #f97316 !important; }
        .border-orange { border-color: #f97316 !important; }

        .mission-title-display {
            background: rgba(59, 130, 246, 0.1);
            border-left: 3px solid var(--accent);
            padding: 8px 12px;
            border-radius: 0 4px 4px 0;
        }

        /* Drag-and-drop cloze styling */
        .drag-drop-cloze {
            max-width: 100%;
        }

        .cloze-text {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 8px;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .drop-zone {
            display: inline-block;
            min-width: 80px;
            padding: 4px 8px;
            margin: 0 4px;
            border: 2px dashed var(--accent);
            border-radius: 4px;
            background: rgba(59, 130, 246, 0.1);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .drop-zone:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--warning);
        }

        .drop-zone.filled {
            border: 2px solid var(--success);
            background: rgba(34, 197, 94, 0.1);
        }

        .dropped-option {
            background: var(--success);
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
        }

        .dropped-option:hover {
            opacity: 0.8;
        }

        .options-pool {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
        }

        .options-label {
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .options-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .draggable-option {
            display: inline-block;
            background: var(--secondary);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: grab;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .draggable-option:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        .draggable-option.dragging {
            opacity: 0.5;
            transform: rotate(5deg);
        }

        .cloze-instructions {
            text-align: center;
            color: var(--text);
            font-style: italic;
            margin-top: 10px;
        }

        /* Highlight selection styling */
        .highlight-select {
            max-width: 100%;
        }

        .highlight-instruction {
            background: rgba(59, 130, 246, 0.1);
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid var(--accent);
            font-weight: 500;
        }

        .highlight-text {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 8px;
            line-height: 1.7;
            font-size: 1.05rem;
            margin-top: 15px;
        }

        .text-highlight {
            background: rgba(59, 130, 246, 0.2);
            border-radius: 3px;
            padding: 2px 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .text-highlight:hover {
            background: rgba(59, 130, 246, 0.4);
            border-color: var(--accent);
        }

        .text-highlight.selected {
            background: var(--success);
            color: white;
            border-color: var(--success);
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.4);
        }

        .text-highlight.highlight-correct {
            border-bottom: 2px solid var(--success);
        }

        .text-highlight.highlight-distractor {
            border-bottom: 2px solid var(--danger);
        }

        .highlight-option {
            color: #e0e0e0;
            user-select: none;
            -webkit-user-select: none;
        }

        .highlight-option:hover {
            border-color: rgba(255,255,255,0.4) !important;
            background: rgba(255,255,255,0.08) !important;
        }

        .highlight-option.selected {
            border-color: var(--accent) !important;
            background: rgba(0, 212, 170, 0.15) !important;
            color: white;
        }

        .point-label {
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            font-size: 0.65rem;
            margin-top: 15px;
            letter-spacing: 1.5px;
            display: block;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
            margin-bottom: 5px;
        }

        .point-value {
            font-size: 0.92rem;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .ae-common {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 6px;
            margin-top: 5px;
            font-size: 0.85rem;
            border: 1px solid var(--warning);
        }

        .ae-severe {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: #fca5a5;
            padding: 10px;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .inter-table {
            width: 100%;
            margin-top: 10px;
            font-size: 0.85rem;
            border-collapse: separate;
            border-spacing: 0 5px;
        }

        .inter-table td {
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        .inter-table tr.critical td {
            border-left: 5px solid var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .data-strip {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .logistics-box {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .box-dosage {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
        }

        .box-admin {
            background: rgba(245, 158, 11, 0.1);
            color: #fcd34d;
        }

        .box-title {
            font-weight: 800;
            font-size: 0.65rem;
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        /* MISSION OVERLAY */
        .mission-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 2100;
            background: var(--primary);
        }

        .chart-pane {
            width: 45%;
            background: #f1f5f9 !important;
            border-right: 4px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .chart-pane * {
            color: #0f172a !important;
        }

        .chart-header,
        .chart-header * {
            background: #334155 !important;
            color: white !important;
        }

        .chart-tabs {
            background: #e2e8f0 !important;
            display: flex;
            border-bottom: 1px solid #cbd5e1;
        }

        .chart-tab {
            padding: 12px 20px;
            cursor: pointer;
            border-right: 1px solid #cbd5e1;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .chart-tab.active {
            background: white !important;
            color: var(--accent) !important;
            border-bottom: 3px solid var(--accent);
        }

        .chart-content {
            padding: 25px;
            flex-grow: 1;
            overflow-y: auto;
            background: white !important;
            line-height: 1.6;
        }

        .work-pane {
            width: 55%;
            padding: 40px;
            overflow-y: auto;
            background: var(--primary);
        }

        /* BOWTIE */
        .bowtie-container {
            display: flex;
            gap: 20px;
            align-items: stretch;
            margin-top: 30px;
        }

        .bowtie-wing {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 20px;
        }

        .bowtie-center {
            width: 250px;
            background: rgba(245, 158, 11, 0.05);
            border: 2px solid var(--warning);
            border-radius: 20px;
            padding: 20px;
        }

        .bowtie-label {
            font-size: 0.7rem;
            font-weight: 900;
            color: var(--accent);
            margin-bottom: 15px;
        }

        .bw-option {
            background: var(--secondary);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .bw-option input {
            margin-right: 10px;
        }

        /* SIDECAR */
        .pharma-sidecar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: var(--secondary);
            z-index: 2200;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            border-left: 2px solid var(--accent);
        }

        .pharma-sidecar.active {
            right: 0;
        }

        .sidecar-header {
            background: var(--primary);
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidecar-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--primary);
        }

        .sidecar-toggle {
            position: fixed;
            right: 20px;
            bottom: 100px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2300;
            border: none;
        }

        /* ============================================
           MOBILE RESPONSIVE - TABLET (max-width: 768px)
           ============================================ */
        @media (max-width: 768px) {
            /* --- NAV BAR --- */
            .nexus-nav {
                padding: 0.6rem 0;
            }

            .nexus-nav h3 {
                font-size: 1.1rem !important;
            }

            .nexus-nav p {
                display: none;
            }

            .nexus-nav .container-fluid {
                flex-wrap: wrap;
                gap: 8px;
            }

            .nav-buttons {
                width: 100%;
                justify-content: center !important;
                flex-wrap: wrap;
                gap: 6px !important;
            }

            .nav-buttons .btn {
                font-size: 0.75rem !important;
                padding: 0.35rem 0.7rem !important;
            }

            .nav-buttons > span {
                width: 100%;
                text-align: center;
                font-size: 0.8rem;
            }

            /* --- CONTROL PANEL (Drug Filters) --- */
            .control-panel {
                top: 62px;
                padding: 10px 0;
            }

            .control-panel .row {
                flex-direction: column;
                gap: 8px !important;
            }

            .control-panel .col-md-4 {
                text-align: center !important;
            }

            .control-panel .btn-group {
                width: 100% !important;
            }

            .control-panel .btn {
                font-size: 0.8rem;
                padding: 0.4rem 0.6rem;
            }

            /* --- HOME SCREEN --- */
            .display-4 {
                font-size: 1.6rem !important;
            }

            .display-4 .me-3 {
                margin-right: 0.5rem !important;
            }

            .col-md-4 .nexus-card {
                margin-bottom: 0;
            }

            /* --- DRUG REFERENCE CARDS --- */
            .col-md-6.mb-4 {
                flex: 0 0 100%;
                max-width: 100%;
            }

            .nexus-card {
                padding: 18px;
                border-radius: 12px;
            }

            .nexus-card h4 {
                font-size: 1.1rem;
            }

            .point-label {
                font-size: 0.6rem;
            }

            .point-value {
                font-size: 0.85rem;
            }

            .nexus-card .row .col-md-6 {
                flex: 0 0 100%;
                max-width: 100%;
            }

            .data-strip {
                flex-direction: column;
                gap: 8px;
            }

            .inter-table {
                font-size: 0.78rem;
            }

            .inter-table td {
                padding: 6px 8px;
            }

            .ae-common, .ae-severe {
                font-size: 0.8rem;
                padding: 8px;
            }

            /* --- MISSION MODAL --- */
            .mission-container {
                flex-direction: column;
                height: 100vh;
                height: 100dvh;
                overflow-y: auto;
            }

            .chart-pane {
                width: 100% !important;
                height: auto;
                min-height: 35vh;
                max-height: 45vh;
                border-right: none;
                border-bottom: 3px solid var(--border);
                overflow-y: auto;
            }

            .work-pane {
                width: 100% !important;
                height: auto;
                min-height: 55vh;
                padding: 20px 15px;
                overflow-y: auto;
            }

            .chart-header {
                padding: 10px 12px !important;
            }

            .chart-header h5 {
                font-size: 0.95rem !important;
            }

            .chart-header span {
                font-size: 0.7rem !important;
            }

            .chart-tabs {
                flex-wrap: wrap;
            }

            .chart-tab {
                padding: 8px 12px;
                font-size: 0.72rem;
                white-space: nowrap;
            }

            .chart-content {
                padding: 15px;
                font-size: 0.88rem;
            }

            .mission-container .btn {
                font-size: 0.85rem !important;
                padding: 0.45rem 0.9rem !important;
            }

            .step-badge {
                font-size: 0.75rem !important;
            }

            .work-pane h3 {
                font-size: 1.15rem !important;
            }

            .mission-title-display {
                font-size: 0.8rem;
                padding: 6px 10px;
            }

            /* --- BOWTIE --- */
            .bowtie-container {
                flex-direction: column;
                gap: 15px;
            }

            .bowtie-center {
                width: 100%;
            }

            .bowtie-wing {
                padding: 15px;
            }

            .bw-option {
                font-size: 0.88rem;
                padding: 10px 8px;
            }

            /* --- DRAG-AND-DROP CLOZE --- */
            .cloze-text {
                font-size: 0.95rem;
                padding: 15px;
                line-height: 1.8;
            }

            .drop-zone {
                min-width: 60px;
                padding: 4px 6px;
                font-size: 0.85rem;
            }

            .draggable-option {
                padding: 8px 12px;
                font-size: 0.85rem;
                touch-action: none;
            }

            .options-pool {
                padding: 12px;
            }

            /* --- HIGHLIGHT SELECT --- */
            .highlight-text {
                font-size: 0.95rem;
                padding: 15px;
            }

            .text-highlight {
                padding: 3px 5px;
            }

            /* --- SIDECAR (Drug Reference Panel) --- */
            .pharma-sidecar {
                width: 85vw;
                right: -85vw;
            }

            .sidecar-toggle {
                width: 50px;
                height: 50px;
                right: 12px;
                bottom: 80px;
            }

            .sidecar-toggle i {
                font-size: 1.2rem !important;
            }

            /* --- EXAM VIEW --- */
            #examModal, #examSelectionModal {
                padding: 15px !important;
            }

            #examModal .container,
            #examSelectionModal .container {
                padding: 0;
            }

            #examModal h2, #examModal h3 {
                font-size: 1.1rem !important;
            }

            #examModal .fs-5 {
                font-size: 0.95rem !important;
            }

            #examModal label {
                padding: 12px 14px !important;
                font-size: 0.9rem;
            }

            #examModal .d-flex.justify-content-between.align-items-center {
                flex-wrap: wrap;
                gap: 8px;
            }

            #examModal .btn-lg {
                font-size: 0.9rem !important;
                padding: 0.5rem 1.2rem !important;
            }

            #examSelectionModal h2 {
                font-size: 1.2rem !important;
            }

            #examSelectionModal .col-md-6 {
                flex: 0 0 100%;
                max-width: 100%;
            }

            /* --- MISSION SELECTOR --- */
            #missionSelectorModal {
                padding: 15px !important;
            }

            #missionSelectorModal h2 {
                font-size: 1.2rem !important;
            }

            #missionSelectorModal h4 {
                font-size: 1rem !important;
            }

            #missionSelectorModal .col-md-4,
            #missionSelectorModal .col-md-6 {
                flex: 0 0 100%;
                max-width: 100%;
            }

            .mission-btn {
                font-size: 0.85rem;
            }
        }

        /* ============================================
           MOBILE RESPONSIVE - PHONE (max-width: 480px)
           ============================================ */
        @media (max-width: 480px) {
            /* --- NAV BAR --- */
            .nexus-nav h3 {
                font-size: 0.95rem !important;
            }

            .nexus-nav .badge {
                font-size: 0.55rem !important;
                padding: 0.2rem 0.4rem !important;
            }

            .nav-buttons .btn {
                font-size: 0.7rem !important;
                padding: 0.3rem 0.5rem !important;
            }

            /* --- CONTROL PANEL --- */
            .control-panel {
                top: 52px;
            }

            /* --- HOME SCREEN --- */
            .display-4 {

ing quality. Success leads to ego strength; failure leads to difficulty in future stages. (Slide 16)"}, {"id": "q_erikson_stage_16", "slide": 16, "question": "According to Erikson's psychosocial theory, which stage involves the task of integrity?", "options": ["This is a Piaget cognitive stage", "This is not a recognized developmental stage", "This is a Kohlberg moral stage", "Integrity vs Inferiority"], "answer": [0], "rationale": "The correct answer is This is a Piaget cognitive stage. Erikson's Integrity stage focuses on the psychosocial crisis of developing integrity vs the opposing quality. Success leads to ego strength; failure leads to difficulty in future stages. (Slide 16)"}, {"id": "q_piaget_stage_17", "slide": 17, "question": "During Piaget's Formal stage, children primarily learn through:", "options": ["Sensory-motor exploration", "Abstract reasoning, hypothesis testing, and metacognition", "Egocentric symbolic play", "Concrete logical operations"], "answer": [2], "rationale": "The correct answer is Egocentric symbolic play. The formal operational stage (11+ years) allows abstract reasoning, hypothetical-deductive thinking, and metacognition. Adolescents can think about possibilities and moral dilemmas. (Slide 17)"}, {"id": "q_piaget_stage_17", "slide": 17, "question": "During Piaget's Sensorimotor stage, children primarily learn through:", "options": ["Symbolic play and egocentric thinking", "Sensory experiences and motor actions", "Abstract reasoning and hypothesis testing", "Logical operations on concrete objects"], "answer": [0], "rationale": "The correct answer is Symbolic play and egocentric thinking. The sensorimotor stage (birth-2 years) is characterized by learning through sensory experiences and motor actions. Infants develop object permanence and begin intentional actions. (Slide 17)"}, {"id": "q_piaget_stage_17", "slide": 17, "question": "During Piaget's Concrete stage, children primarily learn through:", "options": ["Logical thinking about concrete, tangible objects and events", "Sensory and motor actions only", "Abstract concepts and hypothetical situations", "Egocentric and magical thinking"], "answer": [2], "rationale": "The correct answer is Abstract concepts and hypothetical situations. The concrete operational stage (7-11 years) enables logical operations on concrete objects. Children master conservation, classification, and seriation but struggle with abstract/hypothetical thinking. (Slide 17)"}, {"id": "q_piaget_stage_17", "slide": 17, "question": "During Piaget's Preoperational stage, children primarily learn through:", "options": ["Abstract hypothetical reasoning", "Symbolic thinking, egocentrism, and magical reasoning", "Conservation and reversibility", "Sensory and motor exploration only"], "answer": [2], "rationale": "The correct answer is Conservation and reversibility. The preoperational stage (2-7 years) features symbolic thinking, egocentrism (difficulty seeing others' perspectives), and magical/animistic reasoning. Conservation is not yet mastered. (Slide 17)"}, {"id": "q_definition_10", "slide": 10, "question": "Which statement best describes Personal?", "options": ["This is an outdated concept no longer taught", "This only applies to adult patients, not children", "social Fine motor-adaptive Language Gross motor Purpose is to identify children ...", "This is not a recognized term in pediatric nursing"], "answer": [1], "rationale": "The correct answer is This only applies to adult patients, not children. Personal: social Fine motor-adaptive Language Gross motor Purpose is to identify children unable to perform at an age-appropriate level Not an intelligence test (Slide 10)"}, {"id": "q_nursing_action_4", "slide": 4, "question": "When caring for pediatric patients, the nurse should:", "options": ["must know what is normal in order to recognize any deviations within a", "Use the same approach as with adult patients", "Focus only on the child's physical symptoms", "Exclude family members from care decisions"], "answer": [2], "rationale": "The correct answer is Focus only on the child's physical symptoms. must know what is normal in order to recognize any deviations within a. Family-centered, age-appropriate care is essential in pediatrics. (Slide 4)"}, {"id": "q_nursing_action_33", "slide": 33, "question": "When caring for pediatric patients, the nurse should:", "options": ["Focus only on the child's physical symptoms", "Use the same approach as with adult patients", "Exclude family members from care decisions", "Sugared gum, dried fruits, sugared soft drinks, cake, and candy Recomm"], "answer": [3], "rationale": "The correct answer is Sugared gum, dried fruits, sugared soft drinks, cake, and candy Recomm. Sugared gum, dried fruits, sugared soft drinks, cake, and candy Recomm. Family-centered, age-appropriate care is essential in pediatrics. (Slide 33)"}, {"id": "q_clinical_finding_25", "type": "sata", "slide": 25, "question": "Which of the following are expected findings in An Overview of Growth, Development, and Nutrition? (Select all that apply.)", "options": ["ificantly restrict fat and cholesterol because they are need", "Findings opposite to what was described", "Signs only seen in adults", "Symptoms that indicate immediate emergency"], "answer": [0], "rationale": "The correct answer is ificantly restrict fat and cholesterol because they are need. ificantly restrict fat and cholesterol because they are need is a characteristic finding. Nutrition and Health Promotion To help prevent some illnesses, it is not recomme (Slide 25)"}, {"id": "q_treatment_23", "slide": 23, "question": "What is the primary treatment approach for this pediatric condition?", "options": ["No treatment is available", "Observation only without intervention", "n in a mixture of elements Minerals Compounds Water", "Treatment used only in adults"], "answer": [2], "rationale": "The correct answer is n in a mixture of elements Minerals Compounds Water. n in a mixture of elements Minerals Compounds Water. Food Provides heat and energy Builds and repairs tissues Regulates body processe (Slide 23)"}, {"id": "supp_0", "slide": 99, "question": "Growth in children is best assessed by:", "options": ["Plotting on standardized growth charts over time", "Parent's estimation", "Only weight without height", "Single measurement compared to peers"], "answer": [0], "rationale": "The correct answer is Plotting on standardized growth charts over time. Growth charts (CDC/WHO) track weight, height, head circumference over time. Trends matter more than single points. (Standard NCLEX)"}, {"id": "supp_1", "slide": 99, "question": "Which factor most influences a child's growth pattern?", "options": ["Birth order only", "Genetics and nutrition", "Geographic location", "Gender alone"], "answer": [0], "rationale": "The correct answer is Birth order only. Growth is influenced by genetics, nutrition, hormones, and environment. Adequate nutrition is essential for reaching genetic potential. (Standard NCLEX)"}, {"id": "supp_2", "slide": 99, "question": "A child's head circumference is measured until what age?", "options": ["6 months", "36 months (3 years)", "18 years", "12 months"], "answer": [3], "rationale": "The correct answer is 12 months. Head circumference reflects brain growth. Measure until 36 months using a flexible tape over the occipital and frontal prominences. (Standard NCLEX)"}, {"id": "supp_3", "slide": 99, "question": "The Denver Developmental Screening Test assesses:", "options": ["Intelligence only", "Personal-social, fine motor, language, gross motor", "Vision and hearing only", "Physical growth only"], "answer": [1], "rationale": "The correct answer is Personal-social, fine motor, language, gross motor. Denver II screens four domains at ages 0-6 years to identify developmental delays. It is NOT an IQ test. (Standard NCLEX)"}, {"id": "supp_4", "slide": 99, "question": "What is the most reliable indicator of nutritional status in a child?", "options": ["BMI", "Height", "Weight", "Head circumference"], "answer": [1], "rationale": "The correct answer is Height. Weight is the most sensitive indicator of acute nutritional status. Serial weights track growth patterns. (Standard NCLEX)"}, {"id": "supp_5", "slide": 99, "question": "Which growth pattern is abnormal?", "options": ["Growth spurts followed by plateaus", "A child at the 90th percentile consistently", "A child staying at the 10th percentile consistently", "A child crossing two percentile lines downward"], "answer": [1], "rationale": "The correct answer is A child at the 90th percentile consistently. Crossing two or more percentile lines (especially downward) warrants investigation for growth failure. (Standard NCLEX)"}, {"id": "supp_6", "slide": 99, "question": "When is the first well-child visit recommended?", "options": ["2 weeks of age", "1 year of age", "6 months of age", "At birth only"], "answer": [3], "rationale": "The correct answer is At birth only. First well-child visit is 2 weeks post-discharge. Subsequent visits at 2, 4, 6, 9, 12, 15, 18, 24, 30, 36 months, then annually. (Standard NCLEX)"}, {"id": "supp_7", "slide": 99, "question": "What does BMI-for-age assess in children?", "options": ["Head circumference", "Developmental milestones", "Height only", "Weight relative to height for age and sex"], "answer": [2], "rationale": "The correct answer is Height only. BMI-for-age (2-20 years) identifies underweight, healthy weight, overweight, and obesity. Plot on CDC growth charts. (Standard NCLEX)"}, {"id": "supp_8", "slide": 99, "question": "Which is a sign of failure to thrive?", "options": ["Height above the 95th percentile", "Head circumference at the 50th percentile", "Consistent growth along the 75th percentile", "Weight below the 5th percentile or crossing downward"], "answer": [1], "rationale": "The correct answer is Head circumference at the 50th percentile. FTT: weight <5th percentile OR weight-for-age crossing two major percentiles downward. May be organic or non-organic. (Standard NCLEX)"}, {"id": "supp_9", "slide": 99, "question": "The nurse should measure length in infants using:", "options": ["Visual estimation", "Recumbent position on measuring board", "Parent's estimate", "Standing height"], "answer": [0], "rationale": "The correct answer is Visual estimation. Infants (0-24 months): measure supine (recumbent) length. After 24 months: standing height. (Standard NCLEX)"}, {"id": "supp_10", "slide": 99, "question": "Growth velocity is fastest during which period?", "options": ["Infancy (first year of life)", "Preschool", "Adolescence", "School age"], "answer": [0], "rationale": "The correct answer is Infancy (first year of life). Infancy has the fastest growth velocity. Birth weight doubles by 4-6 months, triples by 1 year. (Standard NCLEX)"}, {"id": "supp_11", "slide": 99, "question": "Which is NOT a normal variant in growth?", "options": ["Crossing from 50th to 75th percentile gradually", "Growth spurts followed by plateaus", "Sudden drop from 50th to 10th percentile", "Consistent 25th percentile tracking"], "answer": [1], "rationale": "The correct answer is Growth spurts followed by plateaus. Sudden crossing of two or more major percentiles downward suggests pathology. Gradual crossing may be normal. (Standard NCLEX)"}, {"id": "supp_12", "slide": 99, "question": "Bone age is assessed by:", "options": ["Weight measurement", "Blood tests", "X-ray of the left hand and wrist", "Height measurement"], "answer": [0], "rationale": "The correct answer is Weight measurement. Bone age (skeletal maturity) is determined by X-ray of left hand/wrist comparing to Greulich-Pyle atlas. (Standard NCLEX)"}, {"id": "supp_13", "slide": 99, "question": "The nurse teaches parents that a 1-year-old should:", "options": ["Triple birth weight and double birth length", "Quadruple birth weight", "Gain 2 pounds per month", "Double birth weight and triple birth length"], "answer": [3], "rationale": "The correct answer is Double birth weight and triple birth length. 1 year: weight triples (~21 lb), length doubles (~30 in), head circumference increases 10 cm. (Standard NCLEX)"}, {"id": "supp_14", "slide": 99, "question": "Which factor has the greatest influence on linear growth in childhood?", "options": ["Exercise alone", "Growth hormone and thyroid hormone", "Diet alone", "Sleep alone"], "answer": [1], "rationale": "The correct answer is Growth hormone and thyroid hormone. GH and thyroid hormone are essential for linear growth. Nutrition provides building blocks; hormones regulate growth. (Standard NCLEX)"}, {"id": "supp_15", "slide": 99, "question": "Cephalocaudal development means:", "options": ["Growth is random", "Growth proceeds from head to toe", "Growth proceeds from center outward", "Growth proceeds at the same rate everywhere"], "answer": [2], "rationale": "The correct answer is Growth proceeds from center outward. Cephalocaudal: head-to-toe progression. Infants lift head before sitting. Proximodistal: center-to-extremity. (Quizlet Ch15)"}, {"id": "supp_16", "slide": 99, "question": "Proximodistal development means:", "options": ["Growth stops at age 2", "Growth is random", "Growth proceeds from head to toe", "Growth proceeds from center of body outward"], "answer": [2], "rationale": "The correct answer is Growth proceeds from head to toe. Proximodistal: trunk control before fingers. Infants grasp before precise finger movements. (Quizlet Ch15)"}, {"id": "supp_17", "slide": 99, "question": "A child who drops two or more percentile lines on a growth chart should:", "options": ["Be evaluated for growth failure", "Be started on growth hormone", "Have no further assessment", "Be ignored as this is normal"], "answer": [0], "rationale": "The correct answer is Be evaluated for growth failure. Dropping 2+ percentiles warrants investigation for nutrition, endocrine, or systemic issues. (Quizlet Ch15)"}, {"id": "supp_18", "slide": 99, "question": "At what age does birth weight typically double?", "options": ["4-6 months", "12 months", "18 months", "2 years"], "answer": [2], "rationale": "The correct answer is 18 months. Birth weight doubles by 4-6 months, triples by 12 months. (Quizlet Ch15)"}, {"id": "supp_19", "slide": 99, "question": "At what age does birth weight typically triple?", "options": ["24 months", "18 months", "6 months", "12 months"], "answer": [2], "rationale": "The correct answer is 6 months. Birth weight triples by age 1 year. Length increases 50% (mostly trunk). (Quizlet Ch15)"}, {"id": "supp_20", "slide": 99, "question": "Which is a sign of well-nourished status in a child?", "options": ["Pale mucous membranes", "Delayed milestones", "Alert, shiny hair, firm gums, steady height/weight gains", "Dull hair, dry skin"], "answer": [3], "rationale": "The correct answer is Dull hair, dry skin. Well-nourished: alert, shiny hair, firm gums/membranes, regular elimination, steady gains. (Quizlet Ch15)"}, {"id": "supp_21", "slide": 99, "question": "Serving size for toddlers is approximately:", "options": ["Unlimited amounts", "Adult portions", "1 cup per year of age", "1 tablespoon per food group per year of age"], "answer": [0], "rationale": "The correct answer is Unlimited amounts. 1 tbsp per year of age (e.g., 2 tbsp at age 2). Prevents overfeeding and food waste. (Quizlet Ch15)"}, {"id": "supp_22", "slide": 99, "question": "The posterior fontanelle closes by:", "options": ["2-3 months", "24 months", "6 months", "12-18 months"], "answer": [1], "rationale": "The correct answer is 24 months. Posterior fontanelle (triangle) closes 2-3 months. Anterior (diamond) closes 12-18 months. (Quizlet Ch15)"}, {"id": "q_matrix_development", "type": "matrix", "slide": 15, "question": "Match each developmental theorist with their key concept.", "columns": ["Erikson", "Piaget", "Kohlberg"], "rows": [{"text": "Psychosocial stages (Trust vs Mistrust, etc.)", "correct_col_idx": 0}, {"text": "Cognitive stages (Sensorimotor, Preoperational, etc.)", "correct_col_idx": 1}, {"text": "Moral development levels (Preconventional, etc.)", "correct_col_idx": 2}], "rationale": "The correct answer is Option 1. Erikson: psychosocial crises. Piaget: cognitive development. Kohlberg: moral reasoning. (Slide 15-20)"}, {"id": "q_cloze_peds", "type": "drag_drop_cloze", "slide": 10, "question": "Complete the statement about pediatric care.", "cloze_text": "Pediatric nursing requires [[BLANK1]] care and consideration of [[BLANK2]] in all interactions.", "drag_options": ["age-appropriate", "family", "adult", "isolation", "medication"], "answer": {"BLANK1": "age-appropriate", "BLANK2": "family"}, "rationale": "The correct answer is Option 1. Family-centered, age-appropriate care is fundamental in pediatrics. (Slide 10)"}, {"id": "q_highlight_normal", "type": "highlight", "slide": 25, "question": "Click on the normal developmental findings.", "highlight_text": "The child demonstrates age-appropriate milestones. Growth follows expected percentiles. The child engages with caregivers appropriately.", "highlight_options": ["age-appropriate milestones", "Growth follows expected percentiles", "engages with caregivers appropriately"], "answer": ["age-appropriate milestones", "Growth follows expected percentiles", "engages with caregivers appropriately"], "rationale": "The correct answers are Option age-appropriate milestones1, Option Growth follows expected percentiles1, Option engages with caregivers appropriately1. All are normal pediatric findings. (Slide 25)"}, {"id": "q_bowtie", "type": "bowtie", "slide": 30, "question": "A child presents with concerning developmental findings.", "left_actions": {"options": ["Perform developmental screening", "Obtain detailed history", "Ignore parental concerns", "Delay assessment"], "answer": ["Perform developmental screening", "Obtain detailed history"]}, "center_condition": {"options": ["Possible developmental concern requiring evaluation", "Normal variation, no action needed", "Immediate emergency"], "answer": "Possible developmental concern requiring evaluation"}, "right_monitor": {"options": ["Follow-up assessments", "Parent education", "No follow-up needed"], "answer": ["Follow-up assessments", "Parent education"]}, "rationale": "The correct answer is Option 1. Early identification and family support are key. (Slide 30)"}];

r year of age", "Withholding meals", "Spanking", "Yelling"], "answer": [1], "rationale": "The correct answer is Withholding meals. Time-out: 1 minute per year of age (max 3 min). Effective when used consistently and calmly. (Standard NCLEX)"}, {"id": "supp_3", "slide": 99, "question": "A 2-year-old should have vocabulary of approximately:", "options": ["500-1000 words", "50-300 words", "10-20 words", "2000 words"], "answer": [1], "rationale": "The correct answer is 50-300 words. 2-year-olds: ~50-300 words, 2-word phrases. 3-year-olds: ~1000 words, 3-word sentences. (Standard NCLEX)"}, {"id": "supp_4", "slide": 99, "question": "Parallel play is characteristic of which age group?", "options": ["Infants", "Toddlers (1-3 years)", "School-age", "Preschoolers"], "answer": [2], "rationale": "The correct answer is School-age. Parallel play: toddlers play alongside but not with each other. Cooperative play develops in preschool. (Standard NCLEX)"}, {"id": "supp_5", "slide": 99, "question": "Temper tantrums in toddlers are:", "options": ["Normal expression of frustration", "Behavioral disorder requiring medication", "Sign of autism", "Abuse indicator"], "answer": [3], "rationale": "The correct answer is Abuse indicator. Tantrums are normal in toddlers as they learn emotional regulation. Respond calmly, ensure safety, ignore attention-seeking. (Standard NCLEX)"}, {"id": "supp_6", "slide": 99, "question": "Which safety measure is MOST important for toddlers?", "options": ["Childproofing the home and close supervision", "Teaching stranger danger", "Bicycle helmet use", "Teaching to dial 911"], "answer": [2], "rationale": "The correct answer is Bicycle helmet use. Toddlers explore actively. Childproofing (locks, gates, outlet covers) + constant supervision prevents injuries. (Standard NCLEX)"}, {"id": "supp_7", "slide": 99, "question": "A toddler who can stack 6-7 blocks demonstrates:", "options": ["Fine motor and cognitive development", "Delayed development", "Advanced development", "Speech delay"], "answer": [1], "rationale": "The correct answer is Delayed development. Stacking blocks: 6 blocks by 24 months. Shows hand-eye coordination and spatial awareness. (Standard NCLEX)"}, {"id": "supp_8", "slide": 99, "question": "What is the primary nutrition concern for toddlers?", "options": ["Obesity", "Protein deficiency", "Iron deficiency anemia from excessive milk intake", "Vitamin C deficiency"], "answer": [0], "rationale": "The correct answer is Obesity. Too much milk (>24 oz/day) displaces iron-rich foods → milk anemia. Limit to 16-24 oz/day. (Standard NCLEX)"}, {"id": "supp_9", "slide": 99, "question": "A 2.5-year-old who wets the bed at night:", "options": ["Has a bladder disorder", "Is within normal limits", "Requires immediate intervention", "Needs punishment"], "answer": [0], "rationale": "The correct answer is Has a bladder disorder. Nighttime dryness may not occur until age 5-7. Enuresis before age 5 is normal. (Standard NCLEX)"}, {"id": "supp_10", "slide": 99, "question": "A toddler's normal pulse rate is:", "options": ["100-160 bpm", "40-80 bpm", "80-130 bpm", "60-100 bpm"], "answer": [3], "rationale": "The correct answer is 60-100 bpm. Toddler HR: 80-130 bpm. Lower than infants. Count apical for 1 full minute. (Standard NCLEX)"}, {"id": "supp_11", "slide": 99, "question": "What is the expected weight gain for toddlers per year?", "options": ["4-6 pounds", "1-2 pounds", "No weight gain", "10-15 pounds"], "answer": [3], "rationale": "The correct answer is 10-15 pounds. Toddlers gain 4-6 pounds and 2-3 inches per year. Growth velocity slows compared to infancy. (Standard NCLEX)"}, {"id": "supp_12", "slide": 99, "question": "A 3-year-old can jump in place. This is:", "options": ["Delayed development", "Advanced development", "Abnormal", "Age-appropriate gross motor development"], "answer": [2], "rationale": "The correct answer is Abnormal. Jumping in place: 24-30 months. Hopping on one foot: 4 years. Skipping: 5 years. (Standard NCLEX)"}, {"id": "supp_13", "slide": 99, "question": "Which is appropriate discipline for a 2-year-old?", "options": ["Logical consequences", "Redirection and distraction", "Taking away privileges for a week", "Grounding"], "answer": [0], "rationale": "The correct answer is Logical consequences. Toddlers: short attention span. Redirection/distraction works best. Time-out also effective. (Standard NCLEX)"}, {"id": "supp_14", "slide": 99, "question": "A toddler who says 'me do it' is demonstrating:", "options": ["Speech delay", "Autonomy and independence", "Attention-seeking", "Rebellion"], "answer": [0], "rationale": "The correct answer is Speech delay. Erikson's Autonomy: toddlers want to do things themselves. Encourage safe independence. (Standard NCLEX)"}];

s Acceptance of separation Increase in communicat (Slide 20)"}, {"id": "q41", "type": "matrix", "slide": 12, "question": "Match each developmental concept.", "columns": ["Correct", "Incorrect"], "rows": [{"text": "Growth is measurable", "correct_col_idx": 0}, {"text": "Development follows predictable patterns", "correct_col_idx": 0}, {"text": "All children develop identically", "correct_col_idx": 1}], "rationale": "The correct answer is Option 1. Growth is measurable; development is predictable but individual. (Slide 12)"}, {"id": "q42", "type": "drag_drop_cloze", "slide": 18, "question": "Complete the statement.", "cloze_text": "Pediatric nurses use [[BLANK1]] techniques and consider [[BLANK2]] in all interactions.", "drag_options": ["age-appropriate", "family", "adult", "isolation"], "answer": {"BLANK1": "age-appropriate", "BLANK2": "family"}, "rationale": "The correct answer is Option 1. Family-centered, age-appropriate care is essential. (Slide 18)"}, {"id": "q43", "type": "highlight", "slide": 22, "question": "Click normal pediatric findings.", "highlight_text": "Child is alert and responsive. Vital signs within age-appropriate range. No distress noted. Parent is engaged.", "highlight_options": ["Child is alert and responsive", "Vital signs within age-appropriate range", "No distress noted", "Parent is engaged"], "answer": ["Child is alert and responsive", "Vital signs within age-appropriate range", "No distress noted", "Parent is engaged"], "rationale": "The correct answers are Option Child is alert and responsive1, Option Vital signs within age-appropriate range1, Option No distress noted1, Option Parent is engaged1. All normal findings. (Slide 22)"}, {"id": "q44", "type": "bowtie", "slide": 28, "question": "Child with concerning findings.", "left_actions": {"options": ["Assess thoroughly", "Notify provider", "Ignore findings", "Send home"], "answer": ["Assess thoroughly", "Notify provider"]}, "center_condition": {"options": ["Requires further evaluation", "Normal variation", "No action needed"], "answer": "Requires further evaluation"}, "right_monitor": {"options": ["Vital signs", "Developmental milestones", "Parental concerns", "Ignore"], "answer": ["Vital signs", "Developmental milestones", "Parental concerns"]}, "rationale": "The correct answer is Option 1. Thorough assessment and follow-up essential. (Slide 28)"}, {"id": "quizlet_lab_lead", "question": "A 4-year-old has a blood lead level of 14 mcg/dL. What is the priority nursing action?", "options": ["No action needed, this is normal", "Report to the provider and initiate lead exposure assessment", "Administer chelation therapy immediately", "Reassure parents this is expected"], "answer": "Report to the provider and initiate lead exposure assessment", "rationale": "The correct answer is No action needed, this is normal. Lead level ≥5 mcg/dL requires intervention. Assess home for lead sources (paint, pipes), teach handwashing, iron-rich diet. Chelation is for higher levels (≥45 mcg/dL). (Quizlet: ATI CMS Peds Practice A)"}, {"id": "quizlet_lab_sodium", "question": "A child on high-dose prednisone has sodium of 150 mEq/L. What is the likely cause?", "options": ["Dehydration from vomiting", "Medication side effect causing sodium retention", "Kidney failure", "Excessive salt intake"], "answer": "Medication side effect causing sodium retention", "rationale": "The correct answer is Dehydration from vomiting. Corticosteroids like prednisone cause sodium retention and potassium loss. Monitor for edema, hypertension. Teach low-sodium diet if needed. (Quizlet: ATI CMS Peds Practice A)"}, {"id": "quizlet_lab_anc", "question": "A child with acute lymphoblastic leukemia (ALL) has an absolute neutrophil count (ANC) of 400/mm³. What precaution is indicated?", "options": ["Standard precautions only", "Neutropenic precautions (avoid crowds, hand hygiene, no fresh flowers)", "Airborne isolation", "Droplet precautions"], "answer": "Neutropenic precautions (avoid crowds, hand hygiene, no fresh flowers)", "rationale": "The correct answer is Standard precautions only. ANC <500 = severe neutropenia. Risk for opportunistic infection. Avoid crowds, sick contacts, raw foods, fresh flowers/plants, and use strict hand hygiene. (Quizlet: ATI CMS Peds Practice A)"}, {"id": "quizlet_med_ferrous", "question": "How should ferrous sulfate be administered to maximize absorption?", "options": ["With milk to prevent stomach upset", "With orange juice on an empty stomach", "With a high-fiber meal", "At bedtime only"], "answer": "With orange juice on an empty stomach", "rationale": "The correct answer is With milk to prevent stomach upset. Vitamin C (ascorbic acid) in orange juice enhances iron absorption. Give on empty stomach if tolerated (or with small snack). Avoid calcium/milk which inhibits absorption. (Quizlet: ATI CMS Peds Practice A)"}, {"id": "quizlet_med_digoxin", "question": "Before giving digoxin to an infant, the nurse should check:", "options": ["Respiratory rate", "Apical pulse for 1 full minute", "Blood pressure", "Oxygen saturation"], "answer": "Apical pulse for 1 full minute", "rationale": "The correct answer is Respiratory rate. Hold digoxin if HR <60-100 bpm (age-dependent). Check apical pulse 1 full minute. Notify provider if below threshold. (Quizlet: ATI CMS Peds Practice A)"}, {"id": "quizlet_med_prednisone", "question": "A child taking oral prednisone long-term should be monitored for:", "options": ["Hypotension and bradycardia", "Hyperglycemia, weight gain, and infection risk", "Constipation and dry skin", "Decreased appetite"], "answer": "Hyperglycemia, weight gain, and infection risk", "rationale": "The correct answer is Hypotension and bradycardia. Corticosteroids cause sodium retention (edema), hyperglycemia, weight gain, moon face, increased infection risk, and can suppress growth. Monitor glucose and weight. (Quizlet: ATI CMS Peds Practice A)"}, {"id": "quizlet_dz_glomerulonephritis", "question": "A child with acute post-streptococcal glomerulonephritis should follow which diet?", "options": ["High-protein, high-sodium", "Low-sodium, fluid-restricted", "High-fat, low-carb", "No dietary restrictions"], "answer": "Low-sodium, fluid-restricted", "rationale": "The correct answer is High-protein, high-sodium. Glomerulonephritis causes fluid retention, hypertension, edema. Low-sodium diet and fluid restriction help reduce edema and control BP. (Quizlet: ATI CMS Peds Practice A)"}, {"id": "quizlet_dz_jia", "question": "A child with juvenile idiopathic arthritis (JIA) should use nighttime splints for:", "options": ["Only painful joints", "Knees, wrists, and hands to maintain function and reduce pain", "Only during flares", "Never - splints worsen stiffness"], "answer": "Knees, wrists, and hands to maintain function and reduce pain", "rationale": "The correct answer is Only painful joints. Night splinting of affected joints (knees, wrists, hands) reduces pain and maintains range of motion. Encourage ROM exercises during day. (Quizlet: ATI CMS Peds Practice A)"}, {"id": "quizlet_dz_croup", "question": "A 2-year-old presents with barky cough, inspiratory stridor, and hoarseness. What is the first-line treatment?", "options": ["IV antibiotics", "Cool mist and oral corticosteroids", "Chest physiotherapy", "Intubation"], "answer": "Cool mist and oral corticosteroids", "rationale": "The correct answer is IV antibiotics. Croup (laryngotracheobronchitis): viral inflammation of larynx/trachea. Cool mist humidifies airways, corticosteroids reduce edema. Racemic epinephrine for severe stridor. (Quizlet: ATI CMS Peds Practice A)"}, {"id": "quizlet_dz_rsv", "question": "An infant with bronchiolitis (RSV) is admitted. What is the priority nursing intervention?", "options": ["Administer antibiotics", "Provide humidified oxygen and nasal suctioning", "Start chest physiotherapy", "Isolate from other infants"], "answer": "Provide humidified oxygen and nasal suctioning", "rationale": "The correct answer is Administer antibiotics. RSV bronchiolitis: supportive care. Infants are obligate nose breathers — suctioning clears secretions. Oxygen for hypoxemia. Hydration. Contact precautions. Antibiotics not indicated (viral). (Quizlet: ATI CMS Peds Practice A)"}, {"id": "quizlet_pain_flacc", "question": "Which pain scale is most appropriate for a 6-month-old nonverbal infant?", "options": ["Numeric 0-10", "Wong-Baker FACES", "FLACC (Face, Legs, Activity, Cry, Consolability)", "Oucher scale"], "answer": "FLACC (Face, Legs, Activity, Cry, Consolability)", "rationale": "The correct answer is Numeric 0-10. FLACC is validated for infants/young children who cannot self-report. Scores 0-2 in 5 categories. FACES for 3+ years, numeric for 8+ years. (Quizlet: ATI CMS Peds Practice A)"}, {"id": "quizlet_cultural_jehova", "question": "An adolescent who is a Jehovah's Witness refuses a blood transfusion. What is the priority nursing action?", "options": ["Administer the transfusion anyway", "Respect the refusal and notify the provider and parents", "Call security", "Transfer to another hospital"], "answer": "Respect the refusal and notify the provider and parents", "rationale": "The correct answer is Administer the transfusion anyway. Respect religious/cultural beliefs. Involve parents in discussion. Document refusal. Explore alternatives (erythropoietin, volume expanders). Ethics consultation if needed. (Quizlet: ATI CMS Peds Practice A)"}, {"id": "quizlet_immun_tdap", "question": "An adolescent completed all immunizations through age 6. Which vaccine is needed now?", "options": ["No vaccines until age 18", "Tdap booster", "MMR only", "Varicella only"], "answer": "Tdap booster", "rationale": "The correct answer is No vaccines until age 18. Tdap is recommended at age 11-12 (or catch-up). Also: MCV4, HPV series. Adolescents who completed DTaP through age 6 need Tdap booster. (Quizlet: ATI CMS Peds Practice A)"}];

 is No one. School-age: prefer same-sex peers, same-age friends. Peer relationships are crucial for development. (Standard NCLEX)"}, {"id": "supp_3", "slide": 99, "question": "A 10-year-old can classify objects by multiple attributes. This demonstrates:", "options": ["Formal operational thinking", "Sensorimotor thinking", "Preoperational thinking", "Concrete operational thinking"], "answer": [2], "rationale": "The correct answer is Preoperational thinking. Classification (multiple criteria), seriation, conservation mastered in concrete operational stage. (Standard NCLEX)"}, {"id": "supp_4", "slide": 99, "question": "School-age children are in which Freudian stage?", "options": ["Oedipal", "Oral", "Latency", "Genital"], "answer": [0], "rationale": "The correct answer is Oedipal. Latency (6-puberty): sexual impulses are repressed; focus on school, friends, skills. (Standard NCLEX)"}, {"id": "supp_5", "slide": 99, "question": "A school-age child who loses a tooth should:", "options": ["Save in a jar", "Discard immediately", "Swallow it", "Place under pillow for Tooth Fairy"], "answer": [3], "rationale": "The correct answer is Place under pillow for Tooth Fairy. Cultural practices vary. Tooth Fairy is common in US. Loss of primary teeth is normal at 6-12 years. (Standard NCLEX)"}, {"id": "supp_6", "slide": 99, "question": "Which is a normal vital sign for a 7-year-old?", "options": ["HR 70-120 bpm, RR 16-22", "HR 100-160 bpm, RR 30-60", "HR 40-60 bpm, RR 8-12", "HR 60-100 bpm, RR 12-20"], "answer": [2], "rationale": "The correct answer is HR 40-60 bpm, RR 8-12. School-age HR: 70-120 bpm; RR: 16-22/min. Lower than infants. (Standard NCLEX)"}, {"id": "supp_7", "slide": 99, "question": "School-age children should receive which immunizations?", "options": ["None until age 11", "Hepatitis B only", "DTaP, MMR, Varicella, IPV boosters", "Only flu vaccine"], "answer": [1], "rationale": "The correct answer is Hepatitis B only. School-age: catch-up and boosters. Tdap, MMR, Varicella, IPV, flu annually. (Standard NCLEX)"}, {"id": "supp_8", "slide": 99, "question": "What is the leading cause of death in school-age children?", "options": ["Infection", "Cancer", "Unintentional injuries (accidents)", "Heart disease"], "answer": [2], "rationale": "The correct answer is Unintentional injuries (accidents). Unintentional injuries (MVAs, drowning, burns) are the #1 cause of death in children 5-14 years. (Standard NCLEX)"}, {"id": "supp_9", "slide": 99, "question": "A 9-year-old can use a dictionary to find words. This shows:", "options": ["Delayed development", "Preoperational thinking", "Concrete operational thinking", "Formal operational thinking"], "answer": [1], "rationale": "The correct answer is Preoperational thinking. Dictionary use requires alphabetizing and logical searching — concrete operational skill. (Standard NCLEX)"}, {"id": "q_matrix_development", "type": "matrix", "slide": 15, "question": "Match each developmental theorist with their key concept.", "columns": ["Erikson", "Piaget", "Kohlberg"], "rows": [{"text": "Psychosocial stages (Trust vs Mistrust, etc.)", "correct_col_idx": 0}, {"text": "Cognitive stages (Sensorimotor, Preoperational, etc.)", "correct_col_idx": 1}, {"text": "Moral development levels (Preconventional, etc.)", "correct_col_idx": 2}], "rationale": "The correct answer is Option 1. Erikson: psychosocial crises. Piaget: cognitive development. Kohlberg: moral reasoning. (Slide 15-20)"}, {"id": "q_cloze_peds", "type": "drag_drop_cloze", "slide": 10, "question": "Complete the statement about pediatric care.", "cloze_text": "Pediatric nursing requires [[BLANK1]] care and consideration of [[BLANK2]] in all interactions.", "drag_options": ["age-appropriate", "family", "adult", "isolation", "medication"], "answer": {"BLANK1": "age-appropriate", "BLANK2": "family"}, "rationale": "The correct answer is Option 1. Family-centered, age-appropriate care is fundamental in pediatrics. (Slide 10)"}, {"id": "q_highlight_normal", "type n": "Which factor increases risk in pediatric patients?", "options": ["associated with age and a pregnant adolescent", "Protective factors that reduce risk", "Unrelated demographic information", "Factors only relevant in adults"], "answer": [1], "rationale": "The correct answer is Protective factors that reduce risk. associated with age and a pregnant adolescent is a known risk factor. Adolescent Pregnancy === NOTES === Discuss the risk factors associated with age ... (Slide 28)"}, {"id": "supp_0", "slide": 99, "question": "Adolescents develop abstract thinking in which Piaget stage?", "options": ["Sensorimotor", "Concrete operational", "Formal operational", "Preoperational"], "answer": [3], "rationale": "The correct answer is Preoperational. Formal operational (11+ years): abstract reasoning, hypothetical thinking, metacognition, moral dilemmas. (Standard NCLEX)"}, {"id": "supp_1", "slide": 99, "question": "According to Erikson, adolescents face which crisis?", "options": ["Identity vs Role Confusion", "Generativity vs Stagnation", "Autonomy vs Shame", "Intimacy vs Isolation"], "answer": [3], "rationale": "The correct answer is Intimacy vs Isolation. Identity vs Role Confusion (12-18 years): adolescents explore who they are, values, beliefs, future roles. (Standard NCLEX)"}, {"id": "supp_2", "slide": 99, "question": "What is the leading cause of death in adolescents?", "options": ["Suicide", "Cancer", "Heart disease", "Unintentional injuries"], "answer": [3], "rationale": "The correct answer is Unintentional injuries. Unintentional injuries (MVAs, especially with alcohol) are #1. Followed by homicide, suicide. (Standard NCLEX)"}, {"id": "supp_3", "slide": 99, "question": "Adolescents are in which Freudian psychosexual stage?", "options": ["Latency", "Phallic", "Anal", "Genital"], "answer": [2], "rationale": "The correct answer is Anal. Genital stage (puberty+): sexual impulses re-emerge; focus on mature relationships. (Standard NCLEX)"}, {"id": "supp_4", "slide": 99, "question": "Which is a normal developmental concern for adolescents?", "options": ["Separation anxiety", "Parallel play", "Body image and peer acceptance", "Fear of monsters"], "answer": [3], "rationale": "The correct answer is Fear of monsters. Adolescents focus on appearance, peer relationships, identity. Body image concerns are normal. (Standard NCLEX)"}, {"id": "supp_5", "slide": 99, "question": "An adolescent who experiments with different hairstyles, friends, and interests is:", "options": ["Confused", "Engaging in normal identity exploration", "Mentally unstable", "Rebellious"], "answer": [3], "rationale": "The correct answer is Rebellious. Experimentation with identity (clothing, music, friends) is normal identity formation. (Standard NCLEX)"}, {"id": "supp_6", "slide": 99, "question": "Confidentiality in adolescent care:", "options": ["Should be maintained except for safety concerns", "Is never required", "Does not apply to minors", "Only for 18+ year olds"], "answer": [1], "rationale": "The correct answer is Is never required. Adolescents have right to confidentiality. Exceptions: imminent harm, abuse, certain STIs. (Standard NCLEX)"}, {"id": "supp_7", "slide": 99, "question": "Which vaccine is recommended at age 11-12?", "options": ["MMR booster", "Only flu vaccine", "Hepatitis B only", "HPV, Tdap, Meningococcal"], "answer": [2], "rationale": "The correct answer is Hepatitis B only. Adolescent vaccines: Tdap, Meningococcal, HPV (series). Flu annually. (Standard NCLEX)"}, {"id": "supp_8", "slide": 99, "question": "What is a key developmental task of adolescence?", "options": ["Potty training", "Learning object permanence", "Achieving independence from parents", "Learning to read"], "answer": [3], "rationale": "The correct answer is Learning to read. Adolescents seek autonomy, identity, and peer relationships while maintaining family connection. (Standard NCLEX)"}, {"id": "supp_9", "slide": 99, "question": "Risk-taking behavior in adolescents is:", "opt atching TV. Medical play helps children express feelings, understand procedures, gain mastery. (Standard NCLEX)"}, {"id": "supp_3", "slide": 99, "question": "The best way to explain hospitalization to a 6-year-old is:", "options": ["Give detailed medical explanation", "Have parents explain", "Not explain anything", "Use simple terms, pictures, and allow questions"], "answer": [2], "rationale": "The correct answer is Not explain anything. School-age: concrete explanations, pictures, tours, medical play. Address concerns directly. (Standard NCLEX)"}, {"id": "supp_4", "slide": 99, "question": "A hospitalized child's favorite blanket or toy should be:", "options": ["Taken away to prevent loss", "Given to another child", "Kept with the child for security", "Placed in storage"], "answer": [0], "rationale": "The correct answer is Taken away to prevent loss. Transitional objects provide comfort and security during hospitalization. (Standard NCLEX)"}, {"id": "supp_5", "slide": 99, "question": "Which intervention helps reduce a child's anxiety before surgery?", "options": ["Having parents leave", "Preoperative tour and preparation", "Not telling the child", "Sedation before arrival"], "answer": [1], "rationale": "The correct answer is Preoperative tour and preparation. Preparation: tour, dolls, age-appropriate explanation, parental presence. Reduces postoperative anxiety. (Standard NCLEX)"}, {"id": "supp_6", "slide": 99, "question": "What is regression in hospitalized children?", "options": ["Learning new skills", "Behaving perfectly", "Progressing faster than expected", "Returning to earlier developmental behaviors"], "answer": [1], "rationale": "The correct answer is Behaving perfectly. Regression (bedwetting, thumbsucking) is normal coping. Reassure parents it's temporary. (Standard NCLEX)"}, {"id": "supp_7", "slide": 99, "question": "Which age group is most concerned about body image during hospitalization?", "options": ["Preschoolers", "Infants", "Adolescents", "Toddlers"], "answer": [3], "rationale": "The correct answer is Toddlers. Adolescents: very concerned about appearance, privacy, peer relationships. Respect modesty. (Standard NCLEX)"}, {"id": "supp_8", "slide": 99, "question": "What is the best approach to administering medications to a toddler?", "options": ["Threaten punishment", "Force the child to swallow", "Use honest, simple explanations and allow choices", "Sneak medications in food"], "answer": [0], "rationale": "The correct answer is Threaten punishment. Honesty builds trust. Offer choices (cup vs spoon). Use praise. (Standard NCLEX)"}, {"id": "supp_9", "slide": 99, "question": "A 4-year-old scheduled for surgery asks 'Will it hurt?' The nurse should:", "options": ["Say 'No, it won't hurt'", "Say 'Maybe'", "Answer honestly and explain pain relief", "Ignore the question"], "answer": [0], "rationale": "The correct answer is Say 'No, it won't hurt'. Honest, age-appropriate answers reduce anxiety. Explain pain management. (Standard NCLEX)"}, {"id": "supp_10", "slide": 99, "question": "Child life specialists help hospitalized children by:", "options": ["Making discharge plans", "Providing age-appropriate preparation, play, and emotional support", "Performing procedures", "Administering medications"], "answer": [3], "rationale": "The correct answer is Administering medications. Child life: therapeutic play, preparation, coping strategies, emotional support. (Standard NCLEX)"}, {"id": "supp_11", "slide": 99, "question": "Parental presence during procedures:", "options": ["Is never allowed", "Should be encouraged when possible", "Only for adolescents", "Only for infants"], "answer": [3], "rationale": "The correct answer is Only for infants. Parental presence: reduces child anxiety, provides comfort. Exceptions: sterile procedures, parental preference. (Standard NCLEX)"}, {"id": "supp_12", "slide": 99, "question": "A 3-year-old undergoing venipuncture should be:", "options": ["Left alone", "Restrained by multiple staff", "Held by parent, distraction, reward afterward", "Told it won't hurt"], "answer": [3], "rationale": "The correct answer is Told it won't hurt. Toddlers: parental holding, distraction (bubbles, songs), praise. Never lie about pain. (Standard NCLEX)"}, {"id": "supp_13", "slide": 99, "question": "For a school-age child, the best preparation for surgery includes:", "options": ["No preparation", "Only telling parents", "Detailed medical lecture", "Tour of OR, seeing equipment, honest answers"], "answer": [2], "rationale": "The correct answer is Detailed medical lecture. School-age: concrete info, tours, medical play, honest answers. (Standard NCLEX)"}, {"id": "supp_14", "slide": 99, "question": "Adolescents in the hospital need:", "options": ["Privacy, control, peer interaction, involvement in decisions", "To be treated like children", "No privacy", "Parental control"], "answer": [0], "rationale": "The correct answer is Privacy, control, peer interaction, involvement in decisions. Adolescents: privacy, autonomy, peer contact, decision-making involvement. (Standard NCLEX)"}, {"id": "supp_15", "slide": 99, "question": "A child expresses fear of needles. The nurse should:", "options": ["Ignore the fear", "Punish for crying", "Tell them not to be afraid", "Validate feelings and provide coping strategies"], "answer": [1], "rationale": "The correct answer is Punish for crying. Acknowledge fear, offer coping (deep breathing, counting), distraction. (Standard NCLEX)"}, {"id": "supp_16", "slide": 99, "question": "Separation anxiety is most intense in:", "options": ["Infants", "Adolescents", "School-age", "Toddlers and preschoolers"], "answer": [2], "rationale": "The correct answer is School-age. Separation anxiety peaks: 10-18 months, remains significant in toddlers/preschoolers. (Standard NCLEX)"}, {"id": "supp_17", "slide": 99, "question": "Therapeutic play allows children to:", "options": ["Express feelings, gain mastery, reduce anxiety", "Only have fun", "Distract from learning", "Avoid procedures"], "answer": [0], "rationale": "The correct answer is Express feelings, gain mastery, reduce anxiety. Therapeutic play: express emotions, understand experiences, coping. (Standard NCLEX)"}, {"id": "supp_18", "slide": 99, "question": "When a child asks 'Am I going to die?', the nurse should:", "options": ["Ignore the question", "Say 'Maybe'", "Answer honestly and assess understanding", "Say 'No, of course not'"], "answer": [2], "rationale": "The correct answer is Answer honestly and assess understanding. Answer honestly, assess fears, provide reassurance. (Standard NCLEX)"}, {"id": "supp_19", "slide": 99, "question": "Family-centered care recognizes that:", "options": ["Families are the constant in a child's life", "Doctors make all decisions", "Nurses know best", "Only medical staff matter"], "answer": [1], "rationale": "The correct answer is Doctors make all decisions. Family-centered: families are partners; respect their expertise on their child. (Standard NCLEX)"}, {"id": "q_matrix_development", "type": "matrix", "slide": 15, "question": "Match each developmental theorist with their key concept.", "columns": ["Erikson", "Piaget", "Kohlberg"], "rows": [{"text": "Psychosocial stages (Trust vs Mistrust, etc.)", "correct_col_idx": 0}, {"text": "Cognitive stages (Sensorimotor, Preoperational, etc.)", "correct_col_idx": 1}, {"text": "Moral development levels (Preconventional, etc.)", "correct_col_idx": 2}], "rationale": "The correct answer is Option 1. Erikson: psychosocial crises. Piaget: cognitive development. Kohlberg: moral reasoning. (Slide 15-20)"}, {"id": "q_cloze_peds", "type": "drag_drop_cloze", "slide": 10, "question": "Complete the statement about pediatric care.", "cloze_text": "Pediatric nursing requires [[BLANK1]] care and consideration of [[BLANK2]] in all interactions.", "drag_options": ["age-appropriate", "family", "adult", "isolation", "medication"], "answer": {"BLANK1": "age-appropriate", "BLANK2": "family"}, "rationale": "The co
