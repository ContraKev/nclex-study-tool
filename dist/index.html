["Self-report", "Vital signs", "Behavioral changes (crying, facial expression)", "Parental report"], "answer": [1], "rationale": "The correct answer is Vital signs. Infants: observe behavioral cues (facial expression, body posture, cry quality). FLACC scale. (Standard NCLEX)"}, {"id": "supp_3", "slide": 99, "question": "Which vital sign changes first in a deteriorating pediatric patient?", "options": ["Blood pressure", "Temperature", "Heart rate", "Respiratory rate"], "answer": [1], "rationale": "The correct answer is Temperature. Respiratory rate changes first in children (compensatory mechanism). BP is a late sign of decompensation. (Standard NCLEX)"}, {"id": "supp_4", "slide": 99, "question": "What is the correct pediatric CPR ratio?", "options": ["Same as adults", "30:1", "30:2 for single rescuer, 15:2 for two rescuers", "15:1"], "answer": [0], "rationale": "The correct answer is Same as adults. Infant/child CPR: 30:2 single, 15:2 two rescuers. Compression depth: 1/3 chest depth. (Standard NCLEX)"}, {"id": "supp_5", "slide": 99, "question": "The leading cause of death in children over 1 year is:", "options": ["Infection", "Congenital anomalies", "Cancer", "Unintentional injuries"], "answer": [0], "rationale": "The correct answer is Infection. Unintentional injuries (drowning, MVAs, burns) are #1 cause of death in children >1 year. (Standard NCLEX)"}, {"id": "supp_6", "slide": 99, "question": "When should car seats face rearward?", "options": ["Until age 4", "Until age 8", "Until age 2 or until child exceeds weight/height limits", "Until age 1"], "answer": [3], "rationale": "The correct answer is Until age 1. AAP: rear-facing until age 2 or until exceeding car seat limits. Then forward-facing with harness. (Standard NCLEX)"}, {"id": "supp_7", "slide": 99, "question": "What is the recommended daily water intake for a 5-year-old?", "options": ["Unlimited", "10 cups", "Approximately 5 cups (40 oz)", "1 cup"], "answer": [0], "rationale": "The correct answer is Unlimited. Children 4-8 years: ~5 cups/day fluids. More with activity/heat. (Standard NCLEX)"}, {"id": "supp_8", "slide": 99, "question": "Which is the best way to prevent childhood obesity?", "options": ["Healthy diet and regular physical activity", "Restricting all fats", "Skipping meals", "Weighing child weekly"], "answer": [1], "rationale": "The correct answer is Restricting all fats. Prevention: balanced diet, 60 min/day physical activity, limit screen time, family meals. (Standard NCLEX)"}, {"id": "supp_9", "slide": 99, "question": "A child who is choking and cannot cough or speak needs:", "options": ["Back blows only", "Nothing — wait", "Abdominal thrusts (Heimlich)", "CPR"], "answer": [2], "rationale": "The correct answer is Abdominal thrusts (Heimlich). Choking: abdominal thrusts for conscious child >1 year. For infant: 5 back blows + 5 chest thrusts. (Standard NCLEX)"}, {"id": "supp_10", "slide": 99, "question": "The safest car seat position for infants is:", "options": ["Rear-facing in the front seat", "Rear-facing in the back seat", "Any position", "Front-facing in the back seat"], "answer": [1], "rationale": "The correct answer is Rear-facing in the back seat. Infants: rear-facing until age 2 or until exceeding car seat limits. Back seat only. (Standard NCLEX)"}, {"id": "supp_11", "slide": 99, "question": "When should children transition to a booster seat?", "options": ["When they outgrow forward-facing harness (typically 4-8 years)", "Never", "At age 2", "At age 12"], "answer": [3], "rationale": "The correct answer is At age 12. Booster: when child exceeds forward-facing harness limits (~40-65 lbs). Until seat belt fits properly (usually 8-12 years). (Standard NCLEX)"}, {"id": "supp_12", "slide": 99, "question": "Drowning prevention includes:", "options": ["Swim lessons only", "Only fencing", "Fencing pools, close supervision, CPR training", "Only supervision"], "answer": [3], "rationale": "The correct answer is Only supervision. Drowning prevention: 4-sided fencing, constant supervision, CPR training, water safety education. (Standard NCLEX)"}, {"id": "supp_13", "slide": 99, "question": "Lead poisoning prevention includes:", "options": ["Nothing", "Only supplements", "Only screening", "Hand washing, removing paint chips, iron-rich diet"], "answer": [1], "rationale": "The correct answer is Only supplements. Lead: hand washing, wet mopping, removing peeling paint, iron/calcium-rich diet. (Standard NCLEX)"}, {"id": "supp_14", "slide": 99, "question": "Poison prevention: keep medications:", "options": ["In easy reach", "Locked up and in original containers", "On kitchen counter", "In purse"], "answer": [3], "rationale": "The correct answer is In purse. Poison prevention: locked cabinets, original containers, childproof caps, poison control number posted. (Standard NCLEX)"}, {"id": "supp_15", "slide": 99, "question": "The leading cause of death in children 1-14 years is:", "options": ["Infection", "Unintentional injuries", "Congenital anomalies", "Cancer"], "answer": [1], "rationale": "The correct answer is Unintentional injuries. Unintentional injuries (MVAs, drowning, burns, poisoning) are #1 cause of death in children. (Standard NCLEX)"}, {"id": "q_matrix_development", "type": "matrix", "slide": 15, "question": "Match each developmental theorist with their key concept.", "columns": ["Erikson", "Piaget", "Kohlberg"], "rows": [{"text": "Psychosocial stages (Trust vs Mistrust, etc.)", "correct_col_idx": 0}, {"text": "Cognitive stages (Sensorimotor, Preoperational, etc.)", "correct_col_idx": 1}, {"text": "Moral development levels (Preconventional, etc.)", "correct_col_idx": 2}], "rationale": "The correct answer is Option 1. Erikson: psychosocial crises. Piaget: cognitive development. Kohlberg: moral reasoning. (Slide 15-20)"}, {"id": "q_cloze_peds", "type": "drag_drop_cloze", "slide": 10, "question": "Complete the statement about pediatric care.", "cloze_text": "Pediatric nursing requires [[BLANK1]] care and consideration of [[BLANK2]] in all interactions.", "drag_options": ["age-appropriate", "family", "adult", "isolation", "medication"], "answer": {"BLANK1": "age-appropriate", "BLANK2": "family"}, "rationale": "The correct answer is Option 1. Family-centered, age-appropriate care is fundamental in pediatrics. (Slide 10)"}, {"id": "q_highlight_normal", "type": "highlight", "slide": 25, "question": "Click on the normal developmental findings.", "highlight_text": "The child demonstrates age-appropriate milestones. Growth follows expected percentiles. The child engages with caregivers appropriately.", "highlight_options": ["age-appropriate milestones", "Growth follows expected percentiles", "engages with caregivers appropriately"], "answer": ["age-appropriate milestones", "Growth follows expected percentiles", "engages with caregivers appropriately"], "rationale": "The correct answers are Option age-appropriate milestones1, Option Growth follows expected percentiles1, Option engages with caregivers appropriately1. All are normal pediatric findings. (Slide 25)"}, {"id": "q_bowtie", "type": "bowtie", "slide": 30, "question": "A child presents with concerning developmental findings.", "left_actions": {"options": ["Perform developmental screening", "Obtain detailed history", "Ignore parental concerns", "Delay assessment"], "answer": ["Perform developmental screening", "Obtain detailed history"]}, "center_condition": {"options": ["Possible developmental concern requiring evaluation", "Normal variation, no action needed", "Immediate emergency"], "answer": "Possible developmental concern requiring evaluation"}, "right_monitor": {"options": ["Follow-up assessments", "Parent education", "No follow-up needed"], "answer": ["Follow-up assessments", "Parent education"]}, "rationale": "The correct answer is Option 1. Early identification and family support are key. (Slide 30)"}];

f 2) === NOTES === Give examples of nutrition and w... (Slide 27)"}, {"id": "supp_0", "slide": 99, "question": "What is the most common congenital heart defect?", "options": ["Tetralogy of Fallot", "Ventricular septal defect (VSD)", "Atrial septal defect", "Patent ductus arteriosus"], "answer": [2], "rationale": "The correct answer is Atrial septal defect. VSD is most common (25-30% of CHDs). Many close spontaneously. (Standard NCLEX)"}, {"id": "supp_1", "slide": 99, "question": "A child with a cyanotic heart defect presents with:", "options": ["Pallor", "Bluish skin, lips, nail beds", "Pink, well-perfused skin", "Yellowish skin"], "answer": [0], "rationale": "The correct answer is Pallor. Cyanotic defects (Tetralogy, Transposition): right-to-left shunt → deoxygenated blood to systemic circulation. (Standard NCLEX)"}, {"id": "supp_2", "slide": 99, "question": "What is 'tet spells' in Tetralogy of Fallot?", "options": ["Seizures", "Fainting spells", "Sudden cyanotic episodes with crying or feeding", "Chest pain"], "answer": [2], "rationale": "The correct answer is Sudden cyanotic episodes with crying or feeding. Tet spells: acute cyanosis from increased R→L shunting during stress. Knee-chest position, oxygen, morphine. (Standard NCLEX)"}, {"id": "supp_3", "slide": 99, "question": "The nurse should place a child in knee-chest position for:", "options": ["Tet spells in Tetralogy of Fallot", "Rheumatic fever", "Heart failure", "Kawasaki disease"], "answer": [2], "rationale": "The correct answer is Heart failure. Knee-chest position increases systemic vascular resistance, decreasing R→L shunt during cyanotic spells. (Standard NCLEX)"}, {"id": "supp_4", "slide": 99, "question": "What is the priority assessment in a child with suspected Kawasaki disease?", "options": ["Respiratory rate", "Mucocutaneuos inflammation (strawberry tongue, rash, conjunctivitis)", "Blood pressure", "Heart murmur"], "answer": [3], "rationale": "The correct answer is Heart murmur. Kawasaki: fever ≥5 days + 4/5 criteria (rash, conjunctivitis, strawberry tongue, lymphadenopathy, extremity changes). Risk of coronary aneurysms. (Standard NCLEX)"}, {"id": "supp_5", "slide": 99, "question": "Rheumatic fever is caused by:", "options": ["Rheumatoid arthritis", "Viral infection", "Autoimmune disorder", "Group A Streptococcus infection"], "answer": [2], "rationale": "The correct answer is Autoimmune disorder. Rheumatic fever: autoimmune response to untreated strep throat. Affects heart, joints, brain, skin. (Standard NCLEX)"}, {"id": "supp_6", "slide": 99, "question": "What is the major complication of untreated strep throat?", "options": ["Pneumonia", "Meningitis", "Rheumatic fever and glomerulonephritis", "Sinusitis"], "answer": [2], "rationale": "The correct answer is Rheumatic fever and glomerulonephritis. Untreated GAS → rheumatic fever (heart damage) or post-streptococcal glomerulonephritis. Treat with penicillin. (Standard NCLEX)"}, {"id": "supp_7", "slide": 99, "question": "A child with heart failure presents with:", "options": ["Hypertension and bradycardia", "Fever and rash", "Tachypnea, tachycardia, hepatomegaly, poor feeding", "Seizures"], "answer": [2], "rationale": "The correct answer is Tachypnea, tachycardia, hepatomegaly, poor feeding. HF in children: tachypnea, tachycardia, diaphoresis with feeding, hepatomegaly, weight gain (fluid). (Standard NCLEX)"}, {"id": "supp_8", "slide": 99, "question": "What is the purpose of prostaglandin E1 in a newborn with duct-dependent lesion?", "options": ["Close the ductus", "Reduce heart rate", "Lower pulmonary pressure", "Keep ductus arteriosus open until surgery"], "answer": [2], "rationale": "The correct answer is Lower pulmonary pressure. PGE1 maintains PDA patency in duct-dependent lesions (HLHS, critical PS) until surgical intervention. (Standard NCLEX)"}, {"id": "supp_9", "slide": 99, "question": "Digoxin is used in pediatric heart failure to:", "options": ["Reduce blood pressure", "Prevent infection", "Increase cardiac contractility and slow heart rate", "Dilate coronary arteries"], "answer": [3], "rationale": "The correct answer is Dilate coronary arteries. Digoxin: positive inotrope, negative chronotrope. Monitor for toxicity (nausea, bradycardia, vision changes). (Standard NCLEX)"}, {"id": "supp_10", "slide": 99, "question": "A VSD causes blood to shunt:", "options": ["Left to right, increased pulmonary flow, no cyanosis", "Right to left, decreased pulmonary flow, cyanosis", "Increased left atrial pressure", "No shunting due to high LV pressure"], "answer": [1], "rationale": "The correct answer is Right to left, decreased pulmonary flow, cyanosis. VSD: L→R shunt (higher LV pressure) → increased pulmonary flow, no cyanosis. Acyanotic defect. (Quizlet Cardio)"}, {"id": "supp_11", "slide": 99, "question": "Classic VSD finding on auscultation:", "options": ["BP higher in arms than legs", "Cyanosis when crying", "Loud, harsh murmur with systolic thrill at left sternal border", "Machinery-like murmur"], "answer": [1], "rationale": "The correct answer is Cyanosis when crying. VSD: loud harsh systolic murmur + thrill at left sternal border. (Quizlet Cardio)"}, {"id": "supp_12", "slide": 99, "question": "Coarctation of the aorta causes BP:", "options": ["Only elevated in right arm", "Lower in legs than arms", "Equal in all extremities", "Higher in legs than arms"], "answer": [2], "rationale": "The correct answer is Equal in all extremities. Coarctation: BP lower in legs (distal to narrowing) than arms (proximal). Classic sign. (Quizlet Cardio)"}, {"id": "supp_13", "slide": 99, "question": "Which defects cause increased pulmonary blood flow?", "options": ["TOF and tricuspid atresia", "PDA and ASD (left-to-right shunts)", "Coarctation of aorta", "Pulmonary stenosis"], "answer": [0], "rationale": "The correct answer is TOF and tricuspid atresia. PDA, ASD: L→R shunts → increased pulmonary flow. TOF, tricuspid atresia: decreased flow. (Quizlet Cardio)"}, {"id": "supp_14", "slide": 99, "question": "Manifestations of Tetralogy of Fallot include:", "options": ["Hypertension, pallor", "Normal growth", "Polycythemia, clubbing, FTT, murmur", "Only murmur"], "answer": [1], "rationale": "The correct answer is Normal growth. TOF (decreased pulmonary flow): polycythemia, clubbing, FTT, systolic murmur. (Quizlet Cardio)"}, {"id": "supp_15", "slide": 99, "question": "Kawasaki disease affects the:", "options": ["Lungs", "Coronary arteries (risk of aneurysms)", "Kidneys", "Brain only"], "answer": [3], "rationale": "The correct answer is Brain only. Kawasaki: vasculitis → coronary aneurysms if untreated. IVIG + aspirin. (Standard NCLEX)"}, {"id": "supp_16", "slide": 99, "question": "Rheumatic heart disease results from:", "options": ["Autoimmune disease", "Viral infection", "Genetic defect", "Untreated Group A strep infection"], "answer": [0], "rationale": "The correct answer is Autoimmune disease. Rheumatic fever → heart valve damage (especially mitral). Prevent with penicillin for strep. (Standard NCLEX)"}, {"id": "supp_17", "slide": 99, "question": "Signs of heart failure in infants include:", "options": ["Cyanosis, clubbing", "Hypertension, bradycardia", "Fever, rash", "Tachypnea, poor feeding, diaphoresis with feeding, hepatomegaly"], "answer": [3], "rationale": "The correct answer is Tachypnea, poor feeding, diaphoresis with feeding, hepatomegaly. HF in infants: tachypnea, poor feeding, diaphoresis, hepatomegaly, weight gain. (Standard NCLEX)"}, {"id": "supp_18", "slide": 99, "question": "Digoxin toxicity signs include:", "options": ["Diarrhea only", "Nausea, bradycardia, vision changes (yellow halos)", "Fever, rash", "Tachycardia, hypertension"], "answer": [2], "rationale": "The correct answer is Fever, rash. Digoxin toxicity: GI (nausea, vomiting), cardiac (bradycardia), visual (halos). (Standard NCLEX)"}, {"id": "supp_19", "slide": 99, "question": "Acyanotic heart defects include:", "options": ["Pulmonary atresia", "VSD, ASD, PDA, coarctation", "Tricuspid atresia", "TOF, transposition"], "answer": [1], "rationale": "The correct answer is VSD, ASD, PDA, coarctation. Acyanotic (L→R): VSD, ASD, PDA, coarctation. Cyanotic (R→L): TOF, transposition, tricuspid atresia. (Standard NCLEX)"}, {"id": "q_matrix_development", "type": "matrix", "slide": 15, "question": "Match each developmental theorist with their key concept.", "columns": ["Erikson", "Piaget", "Kohlberg"], "rows": [{"text": "Psychosocial stages (Trust vs Mistrust, etc.)", "correct_col_idx": 0}, {"text": "Cognitive stages (Sensorimotor, Preoperational, etc.)", "correct_col_idx": 1}, {"text": "Moral development levels (Preconventional, etc.)", "correct_col_idx": 2}], "rationale": "The correct answer is Option 1. Erikson: psychosocial crises. Piaget: cognitive development. Kohlberg: moral reasoning. (Slide 15-20)"}, {"id": "q_cloze_peds", "type": "drag_drop_cloze", "slide": 10, "question": "Complete the statement about pediatric care.", "cloze_text": "Pediatric nursing requires [[BLANK1]] care and consideration of [[BLANK2]] in all interactions.", "drag_options": ["age-appropriate", "family", "adult", "isolation", "medication"], "answer": {"BLANK1": "age-appropriate", "BLANK2": "family"}, "rationale": "The correct answer is Option 1. Family-centered, age-appropriate care is fundamental in pediatrics. (Slide 10)"}, {"id": "q_highlight_normal", "type": "highlight", "slide": 25, "question": "Click on the normal developmental findings.", "highlight_text": "The child demonstrates age-appropriate milestones. Growth follows expected percentiles. The child engages with caregivers appropriately.", "highlight_options": ["age-appropriate milestones", "Growth follows expected percentiles", "engages with caregivers appropriately"], "answer": ["age-appropriate milestones", "Growth follows expected percentiles", "engages with caregivers appropriately"], "rationale": "The correct answers are Option age-appropriate milestones1, Option Growth follows expected percentiles1, nt who is angry at the los", "Treatment used only in adults"], "answer": [3], "rationale": "The correct answer is Treatment used only in adults. examples of how a nurse could support a parent who is angry at the los. Facing Death 48 === NOTES === Give examples of how a nurse could support a paren... (Slide 48)"}, {"id": "q_risk_factor_36", "slide": 36, "question": "Which factor increases risk in pediatric patients?", "options": ["patients Maintenance Reinduction therapy (if relapse occurs) Extramedu", "Factors only relevant in adults", "Protective factors that reduce risk", "Unrelated demographic information"], "answer": [2], "rationale": "The correct answer is Protective factors that reduce risk. patients Maintenance Reinduction therapy (if relapse occurs) Extramedu is a known risk factor. Treatment of Leukemia 36 Radiation and chemotherapy target specific cells. Compo... (Slide 36)"}, {"id": "supp_0", "slide": 99, "question": "When caring for pediatric patients, the nurse should:", "options": ["Include family in care decisions and use age-appropriate communication", "Exclude parents during procedures", "Focus only on the child's medical diagnosis", "Treat all children the same as adults"], "answer": [2], "rationale": "The correct answer is Focus only on the child's medical diagnosis. Family-centered care is essential. Include caregivers, use age-appropriate language, consider developmental needs. (Standard NCLEX)"}, {"id": "supp_1", "slide": 99, "question": "Pain assessment in non-verbal children uses:", "options": ["Asking the child to describe pain", "FLACC scale (Face, Legs, Activity, Cry, Consolability)", "Numeric rating scale (0-10)", "Wong-Baker FACES (if verbal)"], "answer": [0], "rationale": "The correct answer is Asking the child to describe pain. FLACC is validated for infants/young children. FACES for 3+ years. Numeric for 8+ years. (Standard NCLEX)"}, {"id": "supp_2", "slide": 99, "question": "The most reliable indicator of pain in infants is:", "options": ["Vital signs", "Parental report", "Behavioral changes (crying, facial expression)", "Self-report"], "answer": [2], "rationale": "The correct answer is Behavioral changes (crying, facial expression). Infants: observe behavioral cues (facial expression, body posture, cry quality). FLACC scale. (Standard NCLEX)"}, {"id": "supp_3", "slide": 99, "question": "Which vital sign changes first in a deteriorating pediatric patient?", "options": ["Heart rate", "Respiratory rate", "Blood pressure", "Temperature"], "answer": [3], "rationale": "The correct answer is Temperature. Respiratory rate changes first in children (compensatory mechanism). BP is a late sign of decompensation. (Standard NCLEX)"}, {"id": "supp_4", "slide": 99, "question": "What is the correct pediatric CPR ratio?", "options": ["Same as adults", "30:2 for single rescuer, 15:2 for two rescuers", "30:1", "15:1"], "answer": [2], "rationale": "The correct answer is 30:1. Infant/child CPR: 30:2 single, 15:2 two rescuers. Compression depth: 1/3 chest depth. (Standard NCLEX)"}, {"id": "supp_5", "slide": 99, "question": "The leading cause of death in children over 1 year is:", "options": ["Infection", "Cancer", "Congenital anomalies", "Unintentional injuries"], "answer": [3], "rationale": "The correct answer is Unintentional injuries. Unintentional injuries (drowning, MVAs, burns) are #1 cause of death in children >1 year. (Standard NCLEX)"}, {"id": "supp_6", "slide": 99, "question": "When should car seats face rearward?", "options": ["Until age 1", "Until age 2 or until child exceeds weight/height limits", "Until age 4", "Until age 8"], "answer": [0], "rationale": "The correct answer is Until age 1. AAP: rear-facing until age 2 or until exceeding car seat limits. Then forward-facing with harness. (Standard NCLEX)"}, {"id": "supp_7", "slide": 99, "question": "What is the recommended daily water intake for a 5-year-old?", "options": ["Approximately 5 cups (40 oz)", "10 cups", "Unlimited", "1 cup"], "answer": [3], "rationale": "The correct answer is 1 cup. Children 4-8 years: ~5 cups/day fluids. More with activity/heat. (Standard NCLEX)"}, {"id": "supp_8", "slide": 99, "question": "Which is the best way to prevent childhood obesity?", "options": ["Weighing child weekly", "Restricting all fats", "Skipping meals", "Healthy diet and regular physical activity"], "answer": [0], "rationale": "The correct answer is Weighing child weekly. Prevention: balanced diet, 60 min/day physical activity, limit screen time, family meals. (Standard NCLEX)"}, {"id": "supp_9", "slide": 99, "question": "A child who is choking and cannot cough or speak needs:", "options": ["Nothing — wait", "CPR", "Abdominal thrusts (Heimlich)", "Back blows only"], "answer": [0], "rationale": "The correct answer is Nothing — wait. Choking: abdominal thrusts for conscious child >1 year. For infant: 5 back blows + 5 chest thrusts. (Standard NCLEX)"}, {"id": "supp_10", "slide": 99, "question": "The safest car seat position for infants is:", "options": ["Rear-facing in the back seat", "Front-facing in the back seat", "Rear-facing in the front seat", "Any position"], "answer": [3], "rationale": "The correct answer is Any position. Infants: rear-facing until age 2 or until exceeding car seat limits. Back seat only. (Standard NCLEX)"}, {"id": "supp_11", "slide": 99, "question": "When should children transition to a booster seat?", "options": ["Never", "When they outgrow forward-facing harness (typically 4-8 years)", "At age 2", "At age 12"], "answer": [2], "rationale": "The correct answer is At age 2. Booster: when child exceeds forward-facing harness limits (~40-65 lbs). Until seat belt fits properly (usually 8-12 years). (Standard NCLEX)"}, {"id": "supp_12", "slide": 99, "question": "Drowning prevention includes:", "options": ["Only fencing", "Only supervision", "Swim lessons only", "Fencing pools, close supervision, CPR training"], "answer": [1], "rationale": "The correct answer is Only supervision. Drowning prevention: 4-sided fencing, constant supervision, CPR training, water safety education. (Standard NCLEX)"}, {"id": "supp_13", "slide": 99, "question": "Lead poisoning prevention includes:", "options": ["Only screening", "Nothing", "Only supplements", "Hand washing, removing paint chips, iron-rich diet"], "answer": [1], "rationale": "The correct answer is Nothing. Lead: hand washing, wet mopping, removing peeling paint, iron/calcium-rich diet. (Standard NCLEX)"}, {"id": "supp_14", "slide": 99, "question": "Poison prevention: keep medications:", "options": ["In easy reach", "In purse", "Locked up and in original containers", "On kitchen counter"], "answer": [3], "rationale": "The correct answer is On kitchen counter. Poison prevention: locked cabinets, original containers, childproof caps, poison control number posted. (Standard NCLEX)"}, {"id": "supp_15", "slide": 99, "question": "The leading cause of death in children 1-14 years is:", "options": ["Infection", "Cancer", "Unintentional injuries", "Congenital anomalies"], "answer": [1], "rationale": "The correct answer is Cancer. Unintentional injuries (MVAs, drowning, burns, poisoning) are #1 cause of death in children. (Standard NCLEX)"}, {"id": "supp_16", "slide": 99, "question": "Bike helmet use should begin:", "options": ["At age 5", "When child starts riding a bike", "At age 10", "Never needed"], "answer": [2], "rationale": "The correct answer is At age 10. Bike helmet: required for all ages. Proper fit: level on head, snug straps. (Standard NCLEX)"}, {"id": "supp_17", "slide": 99, "question": "Stranger danger education should be:", "options": ["Scary and detailed", "Age-appropriate, focus on trusted adults", "Only for girls", "Not discussed"], "answer": [0], "rationale": "The correct answer is Scary and detailed. Stranger safety: teach trusted adults, 'no, go, tell', never go with strangers. (Standard NCLEX)"}, {"id": "supp_18", "slide": 99, "question": "Sun exposure prevention for infants:", "options": ["Sunglasses only tionale": "The correct answer is Involuntary urination after expected age of control. Enuresis: bedwetting after age 5 (nocturnal) or daytime wetting after age 4. Primary vs secondary. (Standard NCLEX)"}, {"id": "supp_7", "slide": 99, "question": "The first-line treatment for primary nocturnal enuresis is:", "options": ["Antibiotics", "Surgery", "Behavioral interventions (bed alarm, fluid restriction)", "Catheterization"], "answer": [3], "rationale": "The correct answer is Catheterization. Bed alarm + positive reinforcement first-line. Medications (desmopressin) for short-term (camp, sleepovers). (Standard NCLEX)"}, {"id": "supp_8", "slide": 99, "question": "What is the most common renal disorder in children?", "options": ["Renal failure", "Glomerulonephritis", "Nephrotic syndrome", "Polycystic kidney disease"], "answer": [2], "rationale": "The correct answer is Nephrotic syndrome. Nephrotic syndrome: massive proteinuria, hypoalbuminemia, edema, hyperlipidemia. Minimal change disease most common. (Standard NCLEX)"}, {"id": "supp_9", "slide": 99, "question": "A child with nephrotic syndrome presents with:", "options": ["Periorbital edema, generalized edema, foamy urine", "Flank pain and hematuria", "Dysuria and fever", "Hypertension and seizures"], "answer": [0], "rationale": "The correct answer is Periorbital edema, generalized edema, foamy urine. Nephrotic: edema (periorbital, abdominal, genital), weight gain, frothy urine (protein), fatigue. (Standard NCLEX)"}, {"id": "supp_10", "slide": 99, "question": "Wilms tumor (nephroblastoma) is:", "options": ["Most common renal malignancy in children", "Benign tumor", "Adult kidney cancer", "Infectious"], "answer": [3], "rationale": "The correct answer is Infectious. Wilms tumor: most common renal tumor in children. Don't palpate flank (risk of rupture). Surgery + chemo. (Quizlet Peds GU)"}, {"id": "supp_11", "slide": 99, "question": "A child with Wilms tumor should NOT have:", "options": ["IV fluids", "Chest X-ray", "Abdominal palpation or percussion", "Blood pressure monitoring"], "answer": [1], "rationale": "The correct answer is Chest X-ray. Wilms tumor: avoid flank palpation (can rupture/disseminate). Abdominal mass found incidentally. (Quizlet Peds GU)"}, {"id": "supp_12", "slide": 99, "question": "Glomerulonephritis in children is often preceded by:", "options": ["Gastroenteritis", "Respiratory infection", "UTI", "Strep throat or skin infection"], "answer": [0], "rationale": "The correct answer is Gastroenteritis. Post-streptococcal glomerulonephritis: 1-3 weeks after strep infection. Hematuria, edema, hypertension. (Standard NCLEX)"}, {"id": "supp_13", "slide": 99, "question": "Acute glomerulonephritis presents with:", "options": ["Fever only", "Abdominal pain only", "Dysuria, frequency", "Hematuria, edema, hypertension, oliguria"], "answer": [3], "rationale": "The correct answer is Hematuria, edema, hypertension, oliguria. AGN: hematuria (cola-colored urine), periorbital edema, hypertension, decreased urine output. (Standard NCLEX)"}, {"id": "supp_14", "slide": 99, "question": "Hypospadias repair is typically done at:", "options": ["Birth", "6-18 months", "5 years", "Adolescence"], "answer": [2], "rationale": "The correct answer is 5 years. Hypospadias repair: 6-18 months before child is aware. Also corrects chordee if present. (Standard NCLEX)"}, {"id": "supp_15", "slide": 99, "question": "Undescended testes (cryptorchidism) should be surgically corrected by:", "options": ["5 years", "Never", "Adolescence", "12-18 months"], "answer": [0], "rationale": "The correct answer is 5 years. Orchiopexy by 12-18 months to prevent torsion, malignancy, infertility. (Standard NCLEX)"}, {"id": "supp_16", "slide": 99, "question": "Circumcision is contraindicated if:", "options": ["Baby is premature", "Hypospadias or chordee is present", "Parents request it", "Baby is full term"], "answer": [3], "rationale": "The correct answer is Baby is full term. Circumcision contraindicated with hypospadias, chordee, epispadias — foreskin needed for repair. (Standard NCLEX)"}, {"id": "supp_17", "slide": 99, "question": "Nephrotic syndrome is characterized by:", "options": ["Dysuria, frequency", "Massive proteinuria, hypoalbuminemia, edema, hyperlipidemia", "Oliguria only", "Hematuria, hypertension"], "answer": [3], "rationale": "The correct answer is Hematuria, hypertension. Nephrotic: 4 features — proteinuria (>3.5g/day), low albumin, edema, high lipids. (Standard NCLEX)"}, {"id": "supp_18", "slide": 99, "question": "Prednisone is used in nephrotic syndrome to:", "options": ["Remove fluid", "Induce remission and reduce proteinuria", "Treat infection", "Lower blood pressure"], "answer": [2], "rationale": "The correct answer is Treat infection. Nephrotic: steroids (prednisone) induce remission in minimal change disease. (Standard NCLEX)"}, {"id": "supp_19", "slide": 99, "question": "Acute kidney injury in children can result from:", "options": ["Only trauma", "Dehydration, sepsis, nephrotoxic drugs", "Only infection", "Only congenital anomalies"], "answer": [1], "rationale": "The correct answer is Dehydration, sepsis, nephrotoxic drugs. AKI in children: prerenal (dehydration), intrinsic (nephrotoxins, glomerulonephritis), postrenal (obstruction). (Standard NCLEX)"}, {"id": "supp_20", "slide": 99, "question": "A child with UTI and fever needs:", "options": ["Observation only", "Prompt antibiotic treatment to prevent scarring", "Only hydration", "Surgery"], "answer": [2], "rationale": "The correct answer is Only hydration. Febrile UTI: treat promptly with antibiotics. Risk of renal scarring, especially with VUR. (Standard NCLEX)"}, {"id": "q_matrix_development", "type": "matrix", "slide": 15, "question": "Match each developmental theorist with their key concept.", "columns": ["Erikson", "Piaget", "Kohlberg"], "rows": [{"text": "Psychosocial stages (Trust vs Mistrust, etc.)", "correct_col_idx": 0}, {"text": "Cognitive stages (Sensorimotor, Preoperational, etc.)", "co w forward-facing harness (typically 4-8 years). Booster: when child exceeds forward-facing harness limits (~40-65 lbs). Until seat belt fits properly (usually 8-12 years). (Standard NCLEX)"}, {"id": "supp_12", "slide": 99, "question": "Drowning prevention includes:", "options": ["Fencing pools, close supervision, CPR training", "Swim lessons only", "Only fencing", "Only supervision"], "answer": [2], "rationale": "The correct answer is Only fencing. Drowning prevention: 4-sided fencing, constant supervision, CPR training, water safety education. (Standard NCLEX)"}, {"id": "supp_13", "slide": 99, "question": "Lead poisoning prevention includes:", "options": ["Nothing", "Hand washing, removing paint chips, iron-rich diet", "Only supplements", "Only screening"], "answer": [3], "rationale": "The correct answer is Only screening. Lead: hand washing, wet mopping, removing peeling paint, iron/calcium-rich diet. (Standard NCLEX)"}, {"id": "supp_14", "slide": 99, "question": "Poison prevention: keep medications:", "options": ["Locked up and in original containers", "In purse", "On kitchen counter", "In easy reach"], "answer": [1], "rationale": "The correct answer is In purse. Poison prevention: locked cabinets, original containers, childproof caps, poison control number posted. (Standard NCLEX)"}, {"id": "q_matrix_development", "type": "matrix", "slide": 15, "question": "Match each developmental theorist with their key concept.", "columns": ["Erikson", "Piaget", "Kohlberg"], "rows": [{"text": "Psychosocial stages (Trust vs Mistrust, etc.)", "correct_col_idx": 0}, {"text": "Cognitive stages (Sensorimotor, Preoperational, etc.)", "correct_col_idx": 1}, {"text": "Moral development levels (Preconventional, etc.)", "correct_col_idx": 2}], "rationale": "The correct answer is Option 1. Erikson: psychosocial crises. Piaget: cognitive development. Kohlberg: moral reasoning. (Slide 15-20)"}, {"id": "q_cloze_peds", "type": "drag_drop_cloze", "slide": 10, "question": "Complete the statem agious; crops of vesicles → crusts. Infectious 1-2 days before rash until all lesions crusted. (Standard NCLEX)"}, {"id": "supp_3", "slide": 99, "question": "A child with chickenpox should be isolated until:", "options": ["Fever resolves", "All lesions have crusted over", "7 days from onset", "Rash appears"], "answer": [3], "rationale": "The correct answer is Rash appears. Varicella isolation: until all lesions are crusted (usually 5-7 days after rash onset). (Standard NCLEX)"}, {"id": "supp_4", "slide": 99, "question": "What is the classic sign of roseola?", "options": ["Bark-like cough", "Strawberry tongue", "Koplik spots", "High fever for 3-5 days followed by rash"], "answer": [0], "rationale": "The correct answer is Bark-like cough. Roseola (HHV-6): high fever 3-5 days, then defervescense → maculopapular rash on trunk. Common in infants. (Standard NCLEX)"}, {"id": "supp_5", "slide": 99, "question": "Fifth disease (erythema infectiosum) is caused by:", "options": ["Parvovirus B19", "Rubella virus", "Varicella-zoster", "Coxsackievirus"], "answer": [0], "rationale": "The correct answer is Parvovirus B19. Fifth disease: slapped-cheek rash, lacy body rash. Parvovirus B19. Contagious before rash; no isolation needed once rash appears. (Standard NCLEX)"}, {"id": "supp_6", "slide": 99, "question": "A child with mumps presents with:", "options": ["Rash and cough", "Sore throat and rash", "Joint pain and fever", "Parotid gland swelling and fever"], "answer": [0], "rationale": "The correct answer is Rash and cough. Mumps: parotitis (unilateral or bilateral), fever, malaise. Orchitis in postpubertal males. (Standard NCLEX)"}, {"id": "supp_7", "slide": 99, "question": "What is the MMR vaccine schedule?", "options": ["Birth and 6 months", "Only at 12 months", "6 months and 12 months", "12-15 months and 4-6 years"], "answer": [3], "rationale": "The correct answer is 12-15 months and 4-6 years. MMR: first dose 12-15 months, second 4-6 years. Measles, Mumps, Rubella. (Standard NCLEX)"}, {"id": "supp_8", "slide": 99, "question": "What is the most concerning complication of mumps in adolescent males?", "options": ["Pneumonia", "Meningitis", "Orchitis leading to sterility", "Arthritis"], "answer": [1], "rationale": "The correct answer is Meningitis. Mumps orchitis: testicular inflammation; may cause atrophy. Sterility is rare but concerning. (Standard NCLEX)"}, {"id": "supp_9", "slide": 99, "question": "Hand-foot-and-mouth disease is caused by:", "options": ["Herpes simplex virus", "Coxsackievirus A16 or Enterovirus 71", "Measles virus", "Varicella-zoster"], "answer": [0], "rationale": "The correct answer is Herpes simplex virus. HFMD: vesicles on hands, feet, mouth (herpangina). Coxsackievirus. Supportive care. (Standard NCLEX)"}, {"id": "supp_10", "slide": 99, "question": "Measles (rubeola) is prevented by:", "options": ["MMR vaccine at 12-15 months and 4-6 years", "Varicella vaccine", "Antibiotics", "Only good hygiene"], "answer": [0], "rationale": "The correct answer is MMR vaccine at 12-15 months and 4-6 years. Measles: MMR vaccine. Highly contagious. Koplik spots (white spots in mouth) are pathognomonic. (Standard NCLEX)"}, {"id": "supp_11", "slide": 99, "question": "Rubella (German measles) is concerning in:", "options": ["Adolescents", "Elderly", "School-age children", "Pregnant women (congenital rubella syndrome)"], "answer": [1], "rationale": "The correct answer is Elderly. Rubella in pregnancy: teratogenic → deafness, cataracts, heart defects. (Standard NCLEX)"}, {"id": "supp_12", "slide": 99, "question": "Pertussis (whooping cough) presents with:", "options": ["Paroxysmal cough with whoop, post-tussive vomiting", "Barky cough", "Dry cough only", "Productive cough"], "answer": [2], "rationale": "The correct answer is Dry cough only. Pertussis: paroxysmal cough, inspiratory whoop, post-tussive emesis. Macrolide antibiotics. (Standard NCLEX)"}, {"id": "supp_13", "slide": 99, "question": "Scarlet fever is caused by:", "options": ["Group A Streptococcus (erythrogenic toxin)", "Virus", "Fungus", "Staphylococcus"], "answer": [1], "rationale": "The correct answer is Virus. Scarlet fever: strep + erythrogenic toxin → sandpaper rash, strawberry tongue, Pastia's lines. (Standard NCLEX)"}, {"id": "supp_14", "slide": 99, "question": "Scarlet fever rash is described as:", "options": ["Vesicular", "Sandpaper-like, starts on trunk", "Pustular", "Maculopapular only"], "answer": [3], "rationale": "The correct answer is Maculopapular only. Scarlet fever: sandpaper rash, starts on trunk/neck, spares face, Pastia's lines (accentuated in creases). (Standard NCLEX)"}, {"id": "supp_15", "slide": 99, "question": "Varicella vaccine is given at:", "options": ["Birth and 6 months", "Not recommended", "Only at 12 months", "12-15 months and 4-6 years"], "answer": [2], "rationale": "The correct answer is Only at 12 months. Varicella (chickenpox): 2 doses — 12-15 months and 4-6 years. (Standard NCLEX)"}, {"id": "supp_16", "slide": 99, "question": "A child with pertussis should be isolated for:", "options": ["7 days from onset", "Until cough resolves", "14 days", "5 days after starting antibiotics"], "answer": [3], "rationale": "The correct answer is 5 days after starting antibiotics. Pertussis: isolate 5 days after antibiotics started (erythromycin/azithromycin). (Standard NCLEX)"}, {"id": "supp_17", "slide": 99, "question": "Rubeola (measles) prodrome includes:", "options": ["Cough, coryza, conjunctivitis, Koplik spots", "Sore throat", "Fever only", "Rash only"], "answer": [0], "rationale": "The correct answer is Cough, coryza, conjunctivitis, Koplik spots. Measles prodrome: 3 C's (cough, coryza, conjunctivitis) + Koplik spots. (Standard NCLEX)"}, {"id": "q_matrix_development", "type": "matrix", "slide": 15, "question": "Match each developmental theorist with their key concept.", "columns": ["Erikson", "Piaget", "Kohlberg"], "rows": [{"text": "Psychosocial stages (Trust vs Mistrust, etc.)", "correct_col_idx": 0}, {"text": ptions": ["Include family in care decisions and use age-appropriate communication", "Exclude parents during procedures", "Focus only on the child's medical diagnosis", "Treat all children the same as adults"], "answer": [0], "rationale": "The correct answer is Include family in care decisions and use age-appropriate communication. Family-centered care is essential. Include caregivers, use age-appropriate language, consider developmental needs. (Standard NCLEX)"}, {"id": "supp_1", "slide": 99, "question": "Pain assessment in non-verbal children uses:", "options": ["Asking the child to describe pain", "Numeric rating scale (0-10)", "FLACC scale (Face, Legs, Activity, Cry, Consolability)", "Wong-Baker FACES (if verbal)"], "answer": [1], "rationale": "The correct answer is Numeric rating scale (0-10). FLACC is validated for infants/young children. FACES for 3+ years. Numeric for 8+ years. (Standard NCLEX)"}, {"id": "supp_2", "slide": 99, "question": "The most reliable indicator of pain in infants is:", "options": ["Self-report", "Behavioral changes (crying, facial expression)", "Vital signs", "Parental report"], "answer": [3], "rationale": "The correct answer is Parental report. Infants: observe behavioral cues (facial expression, body posture, cry quality). FLACC scale. (Standard NCLEX)"}, {"id": "supp_3", "slide": 99, "question": "Which vital sign changes first in a deteriorating pediatric patient?", "options": ["Heart rate", "Temperature", "Blood pressure", "Respiratory rate"], "answer": [2], "rationale": "The correct answer is Blood pressure. Respiratory rate changes first in children (compensatory mechanism). BP is a late sign of decompensation. (Standard NCLEX)"}, {"id": "supp_4", "slide": 99, "question": "What is the correct pediatric CPR ratio?", "options": ["15:1", "30:2 for single rescuer, 15:2 for two rescuers", "Same as adults", "30:1"], "answer": [3], "rationale": "The correct answer is 30:1. Infant/child CPR: 30:2 single, 15:2 two rescuers. Compression depth: 1/3 chest depth. (Standard NCLEX)"}, {"id": "supp_5", "slide": 99, "question": "The leading cause of death in children over 1 year is:", "options": ["Infection", "Unintentional injuries", "Cancer", "Congenital anomalies"], "answer": [1], "rationale": "The correct answer is Unintentional injuries. Unintentional injuries (drowning, MVAs, burns) are #1 cause of death in children >1 year. (Standard NCLEX)"}, {"id": "supp_6", "slide": 99, "question": "When should car seats face rearward?", "options": ["Until age 1", "Until age 4", "Until age 2 or until child exceeds weight/height limits", "Until age 8"], "answer": [3], "rationale": "The correct answer is Until age 8. AAP: rear-facing until age 2 or until exceeding car seat limits. Then forward-facing with harness. (Standard NCLEX)"}, {"id": "supp_7", "slide": 99, "question": "What is the recommended daily water intake for a 5-year-old?", "options": ["10 cups", "Approximately 5 cups (40 oz)", "1 cup", "Unlimited"], "answer": [3], "rationale": "The correct answer is Unlimited. Children 4-8 years: ~5 cups/day fluids. More with activity/heat. (Standard NCLEX)"}, {"id": "supp_8", "slide": 99, "question": "Which is the best way to prevent childhood obesity?", "options": ["Skipping meals", "Healthy diet and regular physical activity", "Weighing child weekly", "Restricting all fats"], "answer": [1], "rationale": "The correct answer is Healthy diet and regular physical activity. Prevention: balanced diet, 60 min/day physical activity, limit screen time, family meals. (Standard NCLEX)"}, {"id": "supp_9", "slide": 99, "question": "A child who is choking and cannot cough or speak needs:", "options": ["Back blows only", "Abdominal thrusts (Heimlich)", "CPR", "Nothing — wait"], "answer": [3], "rationale": "The correct answer is Nothing — wait. Choking: abdominal thrusts for conscious child >1 year. For infant: 5 back blows + 5 chest thrusts. (Standard NCLEX)"}, {"id": "supp_10", "slide": 99, "question": "The safest car seat position for infants is:", "options": ["Any position", "Rear-facing in the front seat", "Front-facing in the back seat", "Rear-facing in the back seat"], "answer": [0], "rationale": "The correct answer is Any position. Infants: rear-facing until age 2 or until exceeding car seat limits. Back seat only. (Standard NCLEX)"}, {"id": "supp_11", "slide": 99, "question": "When should children transition to a booster seat?", "options": ["At age 12", "At age 2", "Never", "When they outgrow forward-facing harness (typically 4-8 years)"], "answer": [3], "rationale": "The correct answer is When they outgrow forward-facing harness (typically 4-8 years). Booster: when child exceeds forward-facing harness limits (~40-65 lbs). Until seat belt fits properly (usually 8-12 years). (Standard NCLEX)"}, {"id": "supp_12", "slide": 99, "question": "Drowning prevention includes:", "options": ["Swim lessons only", "Only fencing", "Only supervision", "Fencing pools, close supervision, CPR training"], "answer": [2], "rationale": "The correct answer is Only supervision. Drowning prevention: 4-sided fencing, constant supervision, CPR training, water safety education. (Standard NCLEX)"}, {"id": "supp_13", "slide": 99, "question": "Lead poisoning prevention includes:", "options": ["Only supplements", "Hand washing, removing paint chips, iron-rich diet", "Nothing", "Only screening"], "answer": [1], "rationale": "The correct answer is Hand washing, removing paint chips, iron-rich diet. Lead: hand washing, wet mopping, removing peeling paint, iron/calcium-rich diet. (Standard NCLEX)"}, {"id": "supp_14", "slide": 99, "question": "Poison prevention: keep medications:", "options": ["On kitchen counter", "In easy reach", "In purse", "Locked up and in original containers"], "answer": [3], "rationale": "The correct answer is Locked up and in original containers. Poison prevention: locked cabinets, original containers, childproof caps, poison control number posted. (Standard NCLEX)"}, {"id": "supp_15", "slide": 99, "question": "The leading cause of death in children 1-14 years is:", "options": ["Infection", "Cancer", "Unintentional injuries", "Congenital anomalies"], "answer": [3], "rationale": "The correct answer is Congenital anomalies. Unintentional injuries (MVAs, drowning, burns, poisoning) are #1 cause of death in children. (Standard NCLEX)"}, {"id": "supp_16", "slide": 99, "question": "Bike helmet use should begin:", "options": ["At age 10", "When child starts riding a bike", "Never needed", "At age 5"], "answer": [3], "rationale": "The correct answer is At age 5. Bike helmet: required for all ages. Proper fit: level on head, snug straps. (Standard NCLEX)"}, {"id": "q_matrix_development", "type": "matrix", "slide": 15, "question": "Match each developmental theorist with their key concept.", "columns": ["Erikson", "Piaget", "Kohlberg"], "rows": [{"text": "Psychosocial stages (Trust vs Mistrust, etc.)", "correct_col_idx": 0}, {"text": "Cognitive stages (Sensorimotor, Preoperational, etc.)", "correct_col_idx": 1}, {"text": "Moral development levels (Preconventional, etc.)", "correct_col_idx": 2}], "rationale": "The correct answer is Option 1. Erikson: psychosocial crises. Piaget: cognitive development. Kohlberg: moral reasoning. (Slide 15-20)"}, {"id": "q_cloze_peds", "type": "drag_drop_cloze", "slide": 10, "question": "Complete the statement about pediatric care.", "cloze_text": "Pediatric nursing requires [[BLANK1]] care and consideration of [[BLANK2]] in all interactions.", "drag_options": ["age-appropriate", "family", "adult", "isolation", "medication"], "answer": {"BLANK1": "age-appropriate", "BLANK2": "family"}, "rationale": "The correct answer is Option 1. Family-centered, age-appropriate care is fundamental in pediatrics. (Slide 10)"}, {"id": "q_highlight_normal", "type": "highlight", "slide": 25, "question": "Click on the normal developmental findings.", "highlight_text": "The child demonstrates age-appropriate milestones. Growth follows expected percentiles. T
